<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2010 Satsangs with Mooji at Arunachala</title>
  <meta name="description" content="A minimalist, spiritual audio player containing the 2010 Satsangs with Mooji at Arunachala, Tiruvannamalai, India.">
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* CSS Variables & Reset */
    :root {
      --bg-color: #fbf9f6;
      --card-bg: #ffffff;
      --card-border: #f0ede6;
      --text-main: #2c2a29;
      --text-muted: #7c756e;
      --accent: #a38a6a;
      --accent-light: #f3ede2;
      --accent-hover: #8f7759;
      --progress-bg: #efeae2;
      --sidebar-width: 380px;
      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --shadow-sm: 0 2px 8px rgba(44, 42, 41, 0.04);
      --shadow-md: 0 8px 24px rgba(44, 42, 41, 0.06);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Layout Structure */
    .app-container {
      display: flex;
      flex: 1;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Sidebar - Satsang List (Left) */
    .sidebar {
      width: var(--sidebar-width);
      background-color: var(--card-bg);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      height: 100%;
      z-index: 10;
      transition: var(--transition);
    }

    .sidebar-header {
      padding: 28px 24px;
      border-bottom: 1px solid var(--card-border);
    }

    .sidebar-header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-main);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .sidebar-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .search-container {
      padding: 16px 24px;
      border-bottom: 1px solid var(--card-border);
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background-color: var(--bg-color);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      color: var(--text-main);
      outline: none;
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: var(--accent);
      background-color: #fff;
    }

    .satsang-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    /* Webkit Scrollbar Customization */
    .satsang-list::-webkit-scrollbar,
    .tracks-list-container::-webkit-scrollbar {
      width: 4px;
    }
    .satsang-list::-webkit-scrollbar-thumb,
    .tracks-list-container::-webkit-scrollbar-thumb {
      background-color: var(--progress-bg);
      border-radius: 4px;
    }

    .satsang-item {
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: var(--transition);
      border: 1px solid transparent;
    }

    .satsang-item:hover {
      background-color: var(--bg-color);
    }

    .satsang-item.active {
      background-color: var(--accent-light);
      border-color: rgba(163, 138, 106, 0.15);
    }

    .satsang-item .item-date {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .satsang-item .item-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .satsang-item .item-track-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
      display: block;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      position: relative;
    }

    /* Top bar for mobile */
    .mobile-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--card-border);
      z-index: 5;
    }

    .mobile-title {
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      flex: 1;
      letter-spacing: -0.02em;
    }

    .menu-toggle-btn {
      background: none;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    /* Audio Player Core Card */
    .player-section {
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--card-border);
      box-shadow: var(--shadow-sm);
    }

    .player-card {
      width: 100%;
      max-width: 680px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .satsang-meta {
      margin-bottom: 16px;
    }

    .satsang-meta .meta-date {
      font-size: 0.85rem;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .satsang-meta .meta-satsang-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 6px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .current-track-title {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-weight: 400;
      max-width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Modern Seekbar */
    .seekbar-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      margin-bottom: 24px;
    }

    .time-indicators {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    .progress-bar-wrapper {
      position: relative;
      width: 100%;
      height: 6px;
      background-color: var(--progress-bg);
      border-radius: 3px;
      cursor: pointer;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background-color: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .progress-handle {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: var(--accent);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.15s ease, left 0.1s linear;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .progress-bar-wrapper:hover .progress-handle {
      transform: translate(-50%, -50%) scale(1);
    }

    /* Player Controls */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
      width: 100%;
    }

    .control-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      transition: var(--transition);
      border-radius: 50%;
    }

    .control-btn:hover {
      color: var(--accent);
      transform: scale(1.05);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      width: 48px;
      height: 48px;
      background-color: var(--bg-color);
      border: 1px solid var(--card-border);
    }

    .btn-primary {
      width: 72px;
      height: 72px;
      background-color: var(--accent);
      color: #ffffff;
      box-shadow: var(--shadow-md);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      color: #ffffff;
    }

    /* Volume Control */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 160px;
    }

    .volume-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      transition: var(--transition);
    }

    .volume-btn:hover {
      color: var(--accent);
    }

    .volume-slider-wrapper {
      position: relative;
      flex: 1;
      height: 4px;
      background-color: var(--progress-bg);
      border-radius: 2px;
      cursor: pointer;
    }

    .volume-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background-color: var(--accent);
      border-radius: 2px;
      width: 80%;
    }

    /* Track List Section (Bottom) */
    .tracks-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      max-width: 100%;
    }

    .tracks-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    .tracks-header {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }

    .track-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 6px;
      border: 1px solid transparent;
    }

    .track-row:hover {
      background-color: var(--card-bg);
      border-color: var(--card-border);
    }

    .track-row.active {
      background-color: var(--accent-light);
      border-color: rgba(163, 138, 106, 0.12);
    }

    .track-num {
      width: 32px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .track-title {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text-main);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-row.active .track-title {
      color: var(--accent);
      font-weight: 600;
    }

    .track-status-icon {
      margin-right: 12px;
      display: none;
      color: var(--accent);
    }

    .track-row.active .track-status-icon {
      display: block;
    }

    .track-row.active .track-num {
      display: none;
    }

    /* Spiritual subtle watermark background */
    .arunachala-watermark {
      position: absolute;
      bottom: 24px;
      right: 24px;
      font-size: 6rem;
      font-weight: 800;
      opacity: 0.02;
      pointer-events: none;
      user-select: none;
    }

    .mooji-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dashed transparent;
      transition: var(--transition);
      cursor: pointer;
    }
    .mooji-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Mobile Sheet / Drawer for Satsangs */
    .mobile-drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(44, 42, 41, 0.4);
      backdrop-filter: blur(4px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 85%;
      max-width: 360px;
      background-color: var(--card-bg);
      z-index: 101;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 8px 0 32px rgba(0, 0, 0, 0.08);
    }

    .mobile-drawer.open {
      transform: translateX(0);
    }

    .mobile-drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-drawer-close {
      position: absolute;
      top: 24px;
      right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* SVGs for icons */
    .icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* Responsive styling */
    @media (max-width: 768px) {
      body {
        height: 100vh;
        overflow: hidden;
      }

      .app-container {
        flex-direction: column;
      }

      .sidebar {
        display: none; /* Handled by drawer on mobile */
      }

      .mobile-header {
        display: flex;
      }

      .player-section {
        padding: 24px 20px;
      }

      .satsang-meta .meta-satsang-title {
        font-size: 1.5rem;
      }

      .controls-row {
        gap: 20px;
      }

      .btn-primary {
        width: 64px;
        height: 64px;
      }

      .tracks-list-container {
        padding: 20px;
      }

      .volume-container {
        display: none; /* Hide volume control on mobile as physical buttons are preferred */
      }
    }
  </style>
</head>

      <div class="arunachala-watermark">Arunachala</div>
    </main>
  </div>

  <!-- Mobile Drawer Structure -->
  <div class="mobile-drawer-overlay" id="drawerOverlay"></div>
  <div class="mobile-drawer" id="mobileDrawer">
    <div class="sidebar-header" style="position: relative;">
      <h1>Arunachala Satsangs</h1>

    // State Variables
    let currentSatsangIdx = 0;
    let currentTrackIdx = 0;
    let isPlaying = false;
    let volume = 0.8; // default volume
    let isMuted = false;
    let prevVolume = 0.8;

    // Audio Instance
    const audio = new Audio();

    // DOM Elements
    const satsangListEl = document.getElementById('satsangList');
    const drawerSatsangListEl = document.getElementById('drawerSatsangList');
    const tracksListEl = document.getElementById('tracksList');
    const searchInput = document.getElementById('searchInput');
    const drawerSearchInput = document.getElementById('drawerSearchInput');
    
    // Player DOM
    const playerDate = document.getElementById('playerDate');
    const playerSatsangTitle = document.getElementById('playerSatsangTitle');
    const playerTrackTitle = document.getElementById('playerTrackTitle');
    
    // Controls & Progress
    const btnPlay = document.getElementById('btnPlay');
    const playIcon = document.getElementById('playIcon');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const btnMute = document.getElementById('btnMute');
    const volumeIcon = document.getElementById('volumeIcon');
    
    const progressBarWrapper = document.getElementById('progressBarWrapper');
    const progressFill = document.getElementById('progressFill');
    const progressHandle = document.getElementById('progressHandle');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');
    const volumeSliderWrapper = document.getElementById('volumeSliderWrapper');
    const volumeFill = document.getElementById('volumeFill');

    // Mobile Drawer Elements
    const menuOpenBtn = document.getElementById('menuOpenBtn');
    const menuCloseBtn = document.getElementById('menuCloseBtn');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const mobileDrawer = document.getElementById('mobileDrawer');

    // Init App
    window.addEventListener('DOMContentLoaded', () => {
      loadSavedState();
      renderSatsangs();
      selectSatsang(currentSatsangIdx, false); // select without autoplay on load
      
      // Setup Audio Listeners
      setupAudioListeners();
      // Setup UI Listeners
      setupUIListeners();
    });

    // Load saved state from LocalStorage
    function loadSavedState() {
      const savedSatsang = localStorage.getItem('mooji_satsang_idx');
      const savedTrack = localStorage.getItem('mooji_track_idx');
      const savedPos = localStorage.getItem('mooji_playback_pos');
      const savedVol = localStorage.getItem('mooji_volume');
      
      if (savedSatsang !== null) currentSatsangIdx = parseInt(savedSatsang, 10);
      if (savedTrack !== null) currentTrackIdx = parseInt(savedTrack, 10);
      if (savedVol !== null) {
        volume = parseFloat(savedVol);
        audio.volume = volume;
        updateVolumeUI();
      }
      
      // We will apply savedPos once the track is loaded
      if (savedPos !== null) {
        const targetPos = parseFloat(savedPos);
        audio.addEventListener('loadedmetadata', function onLoaded() {
          audio.currentTime = targetPos;
          updateProgressBar();
          audio.removeEventListener('loadedmetadata', onLoaded);
        });
      }
    }

    // Save State helper
    function saveState() {
      localStorage.setItem('mooji_satsang_idx', currentSatsangIdx);
      localStorage.setItem('mooji_track_idx', currentTrackIdx);
      localStorage.setItem('mooji_playback_pos', audio.currentTime);
      localStorage.setItem('mooji_volume', volume);
    }

    // Throttled position saving
    let lastSaveTime = 0;
    function throttleSavePosition() {
      const now = Date.now();
      if (now - lastSaveTime > 1000) {
        localStorage.setItem('mooji_playback_pos', audio.currentTime);
        lastSaveTime = now;
      }
    }

    // Render lists
    function renderSatsangs(filterText = '') {
      const cleanFilter = filterText.toLowerCase().trim();
      
      const filtered = SATSANGS.map((s, idx) => {
        const matchesSatsang = s.title.toLowerCase().includes(cleanFilter) || s.date.toLowerCase().includes(cleanFilter);
        const matchingTracks = s.tracks.filter(t => t.title.toLowerCase().includes(cleanFilter));
        return {
          ...s,
          originalIdx: idx,
          matchesSelf: matchesSatsang,
          matchingTracksCount: matchingTracks.length,
          firstMatchingTrack: matchingTracks[0] ? matchingTracks[0].title : null
        };
      }).filter(s => s.matchesSelf || s.matchingTracksCount > 0);

      const buildHtml = (items) => {
        if (items.length === 0) {
          return '<div style="padding: 20px; text-align: center; color: var(--text-muted);">No matching Satsangs</div>';
        }
        return items.map(s => {
          const isActive = s.originalIdx === currentSatsangIdx;
          let matchLabel = '';
          if (cleanFilter && s.matchingTracksCount > 0 && !s.matchesSelf) {
            matchLabel = `<span style="font-size: 0.75rem; color: var(--accent); display: block; margin-top: 4px; font-weight: 500;">↳ Matches: "${s.firstMatchingTrack}"${s.matchingTracksCount > 1 ? ` (+${s.matchingTracksCount - 1} more)` : ''}</span>`;
          }
          return `
            <div class="satsang-item ${isActive ? 'active' : ''}" onclick="onSatsangItemClick(${s.originalIdx})">
              <span class="item-date">${s.date}</span>
              <div class="item-title">${s.title}</div>
              ${matchLabel}
              <span class="item-track-count">${s.tracks.length} tracks</span>
            </div>
          `;
        }).join('');
      };

      const html = buildHtml(filtered);
      satsangListEl.innerHTML = html;
      drawerSatsangListEl.innerHTML = html;
    }

    window.onSatsangItemClick = function(idx) {
      selectSatsang(idx, true);
      // Close drawer on mobile
      closeDrawer();
    };

    // Select Satsang & Render Tracks
    function selectSatsang(idx, autoPlay = true) {
      if (idx < 0 || idx >= SATSANGS.length) return;
      currentSatsangIdx = idx;
      
      // A quick re-render keeps active state perfect
      const activeSearch = searchInput.value || drawerSearchInput.value;
      renderSatsangs(activeSearch);

      const satsang = SATSANGS[idx];
      playerDate.textContent = satsang.date;
      playerSatsangTitle.textContent = satsang.title;

      // If switching satsang, reset track to 0
      // BUT if we searched for a track, we should load that matching track first!
      if (autoPlay) {
        if (activeSearch) {
          // Find the first track matching the search in the selected Satsang
          const matchIdx = satsang.tracks.findIndex(t => t.title.toLowerCase().includes(activeSearch.toLowerCase().trim()));
          currentTrackIdx = matchIdx !== -1 ? matchIdx : 0;
        } else {
          currentTrackIdx = 0;
        }
      }

      renderTracks();
      loadTrack(currentTrackIdx, autoPlay);
    }

    // Render Tracklist
    function renderTracks() {
      const satsang = SATSANGS[currentSatsangIdx];
      const activeSearch = (searchInput.value || drawerSearchInput.value || '').toLowerCase().trim();
      
      tracksListEl.innerHTML = satsang.tracks.map((t, idx) => {
        const isActive = idx === currentTrackIdx;
        const isMatch = activeSearch && t.title.toLowerCase().includes(activeSearch);
        
        return `
          <div class="track-row ${isActive ? 'active' : ''}" style="${isMatch ? 'border-color: rgba(163, 138, 106, 0.4); background-color: var(--accent-light);' : ''}" onclick="selectTrack(${idx})">
            <span class="track-num">${String(idx + 1).padStart(2, '0')}</span>
            <div class="track-status-icon">
              <svg style="width: 16px; height: 16px; fill: var(--accent);" viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
              </svg>
            </div>
            <div class="track-title">${t.title}</div>
            ${isMatch ? `<span style="font-size: 0.75rem; color: var(--accent); font-weight: 600; padding: 2px 8px; background: #fff; border-radius: 20px; border: 1px solid rgba(163, 138, 106, 0.2);">Match</span>` : ''}
          </div>
        `;
      }).join('');
    }

    // Select specific track
    window.selectTrack = function(trackIdx) {
      currentTrackIdx = trackIdx;
      renderTracks();
      loadTrack(currentTrackIdx, true);
    };

    // Load Track MP3
    function loadTrack(trackIdx, autoPlay = false) {
      const satsang = SATSANGS[currentSatsangIdx];
      if (trackIdx < 0 || trackIdx >= satsang.tracks.length) return;
      
      const track = satsang.tracks[trackIdx];
      playerTrackTitle.textContent = track.title;
      
      // Update browser tab title too
      document.title = `${track.title} | Mooji 2010`;
      
      audio.src = track.rel_path;
      audio.load();

      saveState();

      if (autoPlay) {
        playAudio();
      } else {
        pauseAudio();
      }
    }

    // Play/Pause Functions
    function playAudio() {
      audio.play().then(() => {
        isPlaying = true;
        updatePlayBtnUI();
      }).catch(err => {
        console.log("Audio play failed / user gesture needed:", err);
      });
    }

    function pauseAudio() {
      audio.pause();
      isPlaying = false;
      updatePlayBtnUI();
    }

    function togglePlay() {
      if (isPlaying) {
        pauseAudio();
      } else {
        playAudio();
      }
    }

    function updatePlayBtnUI() {
      if (isPlaying) {
        // Pause icon
        playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
      } else {
        // Play icon
        playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
      }
    }

    // Audio Player Listeners
    function setupAudioListeners() {
      audio.addEventListener('timeupdate', () => {
        updateProgressBar();
        throttleSavePosition();
      });

      audio.addEventListener('durationchange', () => {
        timeTotal.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('ended', () => {
        nextTrack();
      });
    }

    // Next Track
    function nextTrack() {
      const satsang = SATSANGS[currentSatsangIdx];
      if (currentTrackIdx < satsang.tracks.length - 1) {
        currentTrackIdx++;
        renderTracks();
        loadTrack(currentTrackIdx, true);
      } else {
        // Go to next satsang
        if (currentSatsangIdx < SATSANGS.length - 1) {
          selectSatsang(currentSatsangIdx + 1, true);
        } else {
          // Loop to first day, first track
          selectSatsang(0, true);
        }
      }
    }

    // Previous Track
    function prevTrack() {
      // If current track has played more than 3 seconds, restart it
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
        return;
      }
      
      if (currentTrackIdx > 0) {
        currentTrackIdx--;
        renderTracks();
        loadTrack(currentTrackIdx, true);
      } else {
        // Go to previous day
        if (currentSatsangIdx > 0) {
          const prevSatsang = SATSANGS[currentSatsangIdx - 1];
          currentTrackIdx = prevSatsang.tracks.length - 1;
          selectSatsang(currentSatsangIdx - 1, false);
          renderTracks();
          loadTrack(currentTrackIdx, true);
        }
      }
    }

    // UI Listeners
    function setupUIListeners() {
      // Buttons
      btnPlay.addEventListener('click', togglePlay);
      btnPrev.addEventListener('click', prevTrack);
      btnNext.addEventListener('click', nextTrack);

      // Search Inputs
      searchInput.addEventListener('input', (e) => {
        renderSatsangs(e.target.value);
      });
      drawerSearchInput.addEventListener('input', (e) => {
        renderSatsangs(e.target.value);
      });

      // Mobile Drawer toggles
      menuOpenBtn.addEventListener('click', openDrawer);
      menuCloseBtn.addEventListener('click', closeDrawer);
      drawerOverlay.addEventListener('click', closeDrawer);

      // Progress Seek Click/Drag
      progressBarWrapper.addEventListener('mousedown', startScrub);
      progressBarWrapper.addEventListener('touchstart', startScrub, { passive: true });

      // Volume Click
      volumeSliderWrapper.addEventListener('click', setVolumeFromClick);
      btnMute.addEventListener('click', toggleMute);
    }

    // Drawer Helpers
    function openDrawer() {
      mobileDrawer.classList.add('open');
      drawerOverlay.classList.add('open');
    }

    function closeDrawer() {
      mobileDrawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
    }

    // Progress Bar Scrubbing
    let isScrubbing = false;

    function startScrub(e) {
      isScrubbing = true;
      scrub(e);
      window.addEventListener('mousemove', scrub);
      window.addEventListener('mouseup', endScrub);
      window.addEventListener('touchmove', scrub, { passive: true });
      window.addEventListener('touchend', endScrub);
    }

    function scrub(e) {
      if (!isScrubbing) return;
      const rect = progressBarWrapper.getBoundingClientRect();
      let clientX = e.clientX;
      if (e.touches && e.touches[0]) {
        clientX = e.touches[0].clientX;
      }
      
      let percentage = (clientX - rect.left) / rect.width;
      percentage = Math.max(0, Math.min(1, percentage));
      
      progressFill.style.width = `${percentage * 100}%`;
      progressHandle.style.left = `${percentage * 100}%`;
      
      if (audio.duration) {
        const targetTime = percentage * audio.duration;
        timeCurrent.textContent = formatTime(targetTime);
      }
    }

    function endScrub(e) {
      if (!isScrubbing) return;
      isScrubbing = false;
      window.removeEventListener('mousemove', scrub);
      window.removeEventListener('mouseup', endScrub);
      window.removeEventListener('touchmove', scrub);
      window.removeEventListener('touchend', endScrub);

      // Seek audio
      const rect = progressBarWrapper.getBoundingClientRect();
      let clientX = e.clientX;
      if (e.changedTouches && e.changedTouches[0]) {
        clientX = e.changedTouches[0].clientX;
      } else if (e.touches && e.touches[0]) {
        clientX = e.touches[0].clientX;
      }
      
      if (clientX !== undefined) {
        let percentage = (clientX - rect.left) / rect.width;
        percentage = Math.max(0, Math.min(1, percentage));
        if (audio.duration) {
          audio.currentTime = percentage * audio.duration;
          saveState();
        }
      }
    }

    // Format Time Helpers
    function formatTime(secs) {
      if (isNaN(secs)) return "0:00";
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function updateProgressBar() {
      if (isScrubbing) return;
      if (!audio.duration) return;
      
      const percentage = audio.currentTime / audio.duration;
      progressFill.style.width = `${percentage * 100}%`;
      progressHandle.style.left = `${percentage * 100}%`;
      timeCurrent.textContent = formatTime(audio.currentTime);
    }

    // Volume helpers
    function setVolumeFromClick(e) {
      const rect = volumeSliderWrapper.getBoundingClientRect();
      let percentage = (e.clientX - rect.left) / rect.width;
      percentage = Math.max(0, Math.min(1, percentage));
      volume = percentage;
      audio.volume = volume;
      isMuted = false;
      updateVolumeUI();
      saveState();
    }

    function toggleMute() {
      if (isMuted) {
        volume = prevVolume;
        audio.volume = volume;
        isMuted = false;
      } else {
        prevVolume = volume;
        audio.volume = 0;
        isMuted = true;
      }
      updateVolumeUI();
    }

    function updateVolumeUI() {
      const displayVol = isMuted ? 0 : volume;
      volumeFill.style.width = `${displayVol * 100}%`;
      
      // Update Volume Icon
      if (displayVol === 0) {
        volumeIcon.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
      } else if (displayVol < 0.5) {
        volumeIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>`;
      } else {
        volumeIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
      }
    }
  </script>
</body>
</html>
