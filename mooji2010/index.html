<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2010 Satsangs with Mooji at Arunachala</title>
  <meta name="description" content="A minimalist, spiritual audio player containing the 2010 Satsangs with Mooji at Arunachala, Tiruvannamalai, India.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪷</text></svg>">
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* CSS Variables & Reset */
    :root {
      --bg-color: #fbf9f6;
      --card-bg: #ffffff;
      --card-border: #f0ede6;
      --text-main: #2c2a29;
      --text-muted: #7c756e;
      --accent: #a38a6a;
      --accent-light: #f3ede2;
      --accent-hover: #8f7759;
      --progress-bg: #efeae2;
      --sidebar-width: 380px;
      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --shadow-sm: 0 2px 8px rgba(44, 42, 41, 0.04);
      --shadow-md: 0 8px 24px rgba(44, 42, 41, 0.06);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Layout Structure */
    .app-container {
      display: flex;
      flex: 1;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Sidebar - Satsang List (Left) */
    .sidebar {
      width: var(--sidebar-width);
      background-color: var(--card-bg);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      height: 100%;
      z-index: 10;
      transition: var(--transition);
    }

    .sidebar-header {
      padding: 28px 24px;
      border-bottom: 1px solid var(--card-border);
    }

    .sidebar-header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-main);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .sidebar-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .search-container {
      padding: 16px 24px;
      border-bottom: 1px solid var(--card-border);
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background-color: var(--bg-color);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      color: var(--text-main);
      outline: none;
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: var(--accent);
      background-color: #fff;
    }

    .satsang-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    /* Webkit Scrollbar Customization */
    .satsang-list::-webkit-scrollbar,
    .tracks-list-container::-webkit-scrollbar {
      width: 4px;
    }
    .satsang-list::-webkit-scrollbar-thumb,
    .tracks-list-container::-webkit-scrollbar-thumb {
      background-color: var(--progress-bg);
      border-radius: 4px;
    }

    .satsang-item {
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: var(--transition);
      border: 1px solid transparent;
    }

    .satsang-item:hover {
      background-color: var(--bg-color);
    }

    .satsang-item.active {
      background-color: var(--accent-light);
      border-color: rgba(163, 138, 106, 0.15);
    }

    .satsang-item .item-date {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .satsang-item .item-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .satsang-item .item-track-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
      display: block;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      position: relative;
    }

    /* Top bar for mobile */
    .mobile-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--card-border);
      z-index: 5;
    }

    .mobile-title {
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      flex: 1;
      letter-spacing: -0.02em;
    }

    .menu-toggle-btn {
      background: none;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    /* Audio Player Core Card */
    .player-section {
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--card-border);
      box-shadow: var(--shadow-sm);
    }

    .player-card {
      width: 100%;
      max-width: 680px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .satsang-meta {
      margin-bottom: 16px;
    }

    .satsang-meta .meta-date {
      font-size: 0.85rem;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .satsang-meta .meta-satsang-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 6px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .current-track-title {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-weight: 400;
      max-width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Modern Seekbar */
    .seekbar-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      margin-bottom: 24px;
    }

    .time-indicators {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    .progress-bar-wrapper {
      position: relative;
      width: 100%;
      height: 6px;
      background-color: var(--progress-bg);
      border-radius: 3px;
      cursor: pointer;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background-color: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .progress-handle {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: var(--accent);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.15s ease, left 0.1s linear;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .progress-bar-wrapper:hover .progress-handle {
      transform: translate(-50%, -50%) scale(1);
    }

    /* Player Controls */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
      width: 100%;
    }

    .control-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      transition: var(--transition);
      border-radius: 50%;
    }

    .control-btn:hover {
      color: var(--accent);
      transform: scale(1.05);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      width: 48px;
      height: 48px;
      background-color: var(--bg-color);
      border: 1px solid var(--card-border);
    }

    .btn-primary {
      width: 72px;
      height: 72px;
      background-color: var(--accent);
      color: #ffffff;
      box-shadow: var(--shadow-md);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      color: #ffffff;
    }

    /* Volume Control */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 160px;
    }

    .volume-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      transition: var(--transition);
    }

    .volume-btn:hover {
      color: var(--accent);
    }

    .volume-slider-wrapper {
      position: relative;
      flex: 1;
      height: 4px;
      background-color: var(--progress-bg);
      border-radius: 2px;
      cursor: pointer;
    }

    .volume-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background-color: var(--accent);
      border-radius: 2px;
      width: 80%;
    }

    /* Track List Section (Bottom) */
    .tracks-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      max-width: 100%;
    }

    .tracks-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    .tracks-header {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }

    .track-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 6px;
      border: 1px solid transparent;
    }

    .track-row:hover {
      background-color: var(--card-bg);
      border-color: var(--card-border);
    }

    .track-row.active {
      background-color: var(--accent-light);
      border-color: rgba(163, 138, 106, 0.12);
    }

    .track-num {
      width: 32px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .track-title {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text-main);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-row.active .track-title {
      color: var(--accent);
      font-weight: 600;
    }

    .track-status-icon {
      margin-right: 12px;
      display: none;
      color: var(--accent);
    }

    .track-row.active .track-status-icon {
      display: block;
    }

    .track-row.active .track-num {
      display: none;
    }

    /* Spiritual subtle watermark background */
    .arunachala-watermark {
      position: absolute;
      bottom: 24px;
      right: 24px;
      font-size: 6rem;
      font-weight: 800;
      opacity: 0.02;
      pointer-events: none;
      user-select: none;
    }

    .mooji-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dashed transparent;
      transition: var(--transition);
      cursor: pointer;
    }
    .mooji-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .arunachala-link {
      color: inherit;
      text-decoration: none;
      transition: var(--transition);
      cursor: pointer;
    }
    .arunachala-link:hover {
      color: var(--accent);
    }

    /* Mobile Sheet / Drawer for Satsangs */
    .mobile-drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(44, 42, 41, 0.4);
      backdrop-filter: blur(4px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 85%;
      max-width: 360px;
      background-color: var(--card-bg);
      z-index: 101;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 8px 0 32px rgba(0, 0, 0, 0.08);
    }

    .mobile-drawer.open {
      transform: translateX(0);
    }

    .mobile-drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-drawer-close {
      position: absolute;
      top: 24px;
      right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* SVGs for icons */
    .icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* Responsive styling */
    @media (max-width: 768px) {
      body {
        height: 100vh;
        overflow: hidden;
      }

      .app-container {
        flex-direction: column;
      }

      .sidebar {
        display: none; /* Handled by drawer on mobile */
      }

      .mobile-header {
        display: flex;
      }

      .player-section {
        padding: 24px 20px;
      }

      .satsang-meta .meta-satsang-title {
        font-size: 1.5rem;
      }

      .controls-row {
        gap: 20px;
      }

      .btn-primary {
        width: 64px;
        height: 64px;
      }

      .tracks-list-container {
        padding: 20px;
        padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      }

      .volume-container {
        display: none; /* Hide volume control on mobile as physical buttons are preferred */
      }
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(43, 37, 30, 0.95);
      color: #f1ebd9;
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(163, 138, 106, 0.2);
      z-index: 9999;
      font-family: inherit;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
      opacity: 0;
    }
    .toast-container.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Custom Confirmation Modal */
    .confirm-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .confirm-modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .confirm-modal-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
      color: var(--text-main);
    }
    .confirm-modal-overlay.show .confirm-modal-card {
      transform: scale(1);
    }
    .confirm-modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .confirm-modal-text {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .confirm-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .confirm-modal-btn {
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: var(--transition);
      flex: 1;
      outline: none;
    }
    .confirm-modal-btn.cancel {
      background: var(--bg-color);
      border-color: var(--card-border);
      color: var(--text-muted);
    }
    .confirm-modal-btn.cancel:active {
      transform: scale(0.95);
    }
    .confirm-modal-btn.confirm {
      background: var(--accent);
      color: white;
    }
    .confirm-modal-btn.confirm:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <!-- Toast Container -->
  <div id="toast" class="toast-container"></div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="confirm-modal-overlay">
    <div class="confirm-modal-card">
      <div class="confirm-modal-title" id="confirmModalTitle">Switch Track?</div>
      <div class="confirm-modal-text" id="confirmModalText">Do you want to switch to the new track?</div>
      <div class="confirm-modal-actions">
        <button class="confirm-modal-btn cancel" id="btnCancelSwitch">Cancel</button>
        <button class="confirm-modal-btn confirm" id="btnConfirmSwitch">Yes, Switch</button>
      </div>
    </div>
  </div>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <button id="menuOpenBtn" class="menu-toggle-btn" aria-label="Open satsang list">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
    </button>
    <div class="mobile-title"><a href="https://mooji.org" target="_blank" rel="noopener noreferrer" class="mooji-link">Mooji</a> Arunachala 2010</div>
    <div style="width: 40px;"></div> <!-- Spacer -->
  </header>

  <div class="app-container">
    
    <!-- Sidebar for Desktop -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1><a href="https://archive.org/details/aruna2010sat" target="_blank" rel="noopener noreferrer" class="arunachala-link">Arunachala Satsangs</a></h1>
        <p>2010 • <a href="https://mooji.org" target="_blank" rel="noopener noreferrer" class="mooji-link">Mooji</a></p>
      </div>
      <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search Satsang by title or date...">
      </div>
      <div class="satsang-list" id="satsangList">
        <!-- Rendered dynamically -->
      </div>
    </aside>

    <!-- Main Player Area -->
    <main class="main-content">
      
      <!-- Player Unit -->
      <section class="player-section">
        <div class="player-card">
          <div class="satsang-meta">
            <span class="meta-date" id="playerDate">January 6, 2010</span>
            <h2 class="meta-satsang-title" id="playerSatsangTitle">Loading Satsang...</h2>
          </div>
          
          <div class="current-track-title" id="playerTrackTitle">Select a track to begin</div>

          <!-- Seekbar -->
          <div class="seekbar-container">
            <div class="progress-bar-wrapper" id="progressBarWrapper">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-handle" id="progressHandle"></div>
            </div>
            <div class="time-indicators">
              <span id="timeCurrent">0:00</span>
              <span id="timeTotal">0:00</span>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls-row">
            <!-- Prev -->
            <button class="control-btn btn-secondary" id="btnPrev" aria-label="Previous track">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
              </svg>
            </button>

            <!-- Play/Pause -->
            <button class="control-btn btn-primary" id="btnPlay" aria-label="Play track">
              <svg class="icon" id="playIcon" viewBox="0 0 24 24" style="width: 32px; height: 32px;">
                <!-- Play Triangle -->
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>

            <!-- Next -->
            <button class="control-btn btn-secondary" id="btnNext" aria-label="Next track">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/>
              </svg>
            </button>

            <!-- Volume (Desktop only via CSS hidden on mobile) -->
            <div class="volume-container">
              <button class="volume-btn" id="btnMute" aria-label="Mute volume">
                <svg class="icon" id="volumeIcon" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
                  <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
              </button>
              <div class="volume-slider-wrapper" id="volumeSliderWrapper">
                <div class="volume-fill" id="volumeFill"></div>
              </div>
            </div>

            <!-- Boost Toggle Button -->
            <button class="control-btn" id="btnBoost" aria-label="Toggle Volume Boost" style="width: auto; height: 36px; padding: 0 14px; border-radius: 18px; border: 1px solid var(--card-border); background-color: var(--bg-color); font-size: 0.75rem; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 6px; transition: var(--transition); letter-spacing: 0.05em; text-transform: uppercase;">
              <span style="font-size: 0.9rem;">⚡</span> Boost Off

    // State Variables
    let currentSatsangIdx = 0;
    let currentTrackIdx = 0;
    let isPlaying = false;
    let volume = 0.8; // default volume
    let isMuted = false;
    let prevVolume = 0.8;

    // Audio Instance
    const audio = new Audio();
    audio.crossOrigin = "anonymous";
    audio.preload = "auto";
    audio.setAttribute('playsinline', '');

    // Android permits a normal media element to keep playing as background
    // media, but commonly suspends Web Audio contexts when the screen locks.
    // Never move Android playback into Web Audio; uninterrupted playback is
    // more important than the optional gain boost on that platform.
    const isAndroid = /Android/i.test(navigator.userAgent);

    // Web Audio Gain Boost Setup
    let audioCtx = null;
    let gainNode = null;
    let isBoostActive = false; // boost disabled by default
    const BOOST_MULTIPLIER = 3.5; // 3.5x (350%) gain boost (clean & loud)

    function initAudioBoost() {
      if (isAndroid) {
        isBoostActive = false;
        updateAudioGain();
        return false;
      }
      if (audioCtx) {
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        return true;
      }
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContextClass();
        const source = audioCtx.createMediaElementSource(audio);
        
        gainNode = audioCtx.createGain();
        
        // Safety dynamics compressor configured for smooth, transparent protection (no squashing/pumping)
        const limiter = audioCtx.createDynamicsCompressor();
        limiter.threshold.setValueAtTime(-2, audioCtx.currentTime); // Limit only the absolute loudest spikes
        limiter.knee.setValueAtTime(30, audioCtx.currentTime);      // Soft knee for transparent compression
        limiter.ratio.setValueAtTime(4, audioCtx.currentTime);       // Low ratio for natural gain reduction
        limiter.attack.setValueAtTime(0.003, audioCtx.currentTime); // Standard fast attack (3ms)
        limiter.release.setValueAtTime(0.25, audioCtx.currentTime);  // Smooth release (250ms) to prevent breathing

        // Graph connection: Source -> Gain -> Limiter -> Destination (Speakers)
        source.connect(gainNode);
        gainNode.connect(limiter);
        limiter.connect(audioCtx.destination);
        
        updateAudioGain();
        return true;
      } catch (e) {
        console.error("Web Audio API not supported or blocked:", e);
        isBoostActive = false;
        updateAudioGain();
        return false;
      }
    }

    function updateAudioGain() {
      const targetVol = isMuted ? 0 : volume;
      const currentMultiplier = isBoostActive ? BOOST_MULTIPLIER : 1.0;
      if (gainNode) {
        gainNode.gain.setValueAtTime(targetVol * currentMultiplier, audioCtx.currentTime);
        audio.volume = 1.0;
      } else {
        audio.volume = targetVol;
      }
    }

    function toggleBoost() {
      if (isAndroid) {
        isBoostActive = false;
        updateBoostUI();
        saveState();
        showToast("Boost is disabled on Android to keep playback running when the screen locks.");
        return;
      }
      initAudioBoost();
      isBoostActive = !isBoostActive;
      updateAudioGain();
      updateBoostUI();
      saveState();
    }

    function updateBoostUI() {

      if (isBoostActive) {
        btnBoost.style.backgroundColor = 'var(--accent)';

        btnBoost.style.color = '#ffffff';

    // Load saved state from LocalStorage
    function loadSavedState() {
      const savedSatsang = localStorage.getItem('mooji_satsang_idx');
      const savedTrack = localStorage.getItem('mooji_track_idx');
      const savedPos = localStorage.getItem('mooji_playback_pos');
      const savedVol = localStorage.getItem('mooji_volume');
      const savedBoost = localStorage.getItem('mooji_boost_active');
      
      if (savedSatsang !== null) currentSatsangIdx = parseInt(savedSatsang, 10);
      if (savedTrack !== null) currentTrackIdx = parseInt(savedTrack, 10);
      if (savedVol !== null) {
        volume = parseFloat(savedVol);
        updateVolumeUI();
      }
      if (savedBoost !== null) {
        isBoostActive = !isAndroid && (savedBoost === 'true');
      }
      updateBoostUI();
      updateAudioGain();
      
      // We will apply savedPos once the track is loaded
      if (savedPos !== null) {
        const targetPos = parseFloat(savedPos);
        audio.addEventListener('loadedmetadata', function onLoaded() {
          audio.currentTime = targetPos;
          updateProgressBar();
          audio.removeEventListener('loadedmetadata', onLoaded);
        });
      }
    }

    // Save State helper
    function saveState() {
      localStorage.setItem('mooji_satsang_idx', currentSatsangIdx);
      localStorage.setItem('mooji_track_idx', currentTrackIdx);
      localStorage.setItem('mooji_playback_pos', audio.currentTime);
      localStorage.setItem('mooji_volume', volume);
      localStorage.setItem('mooji_boost_active', isBoostActive);
    }

    let lastSaveTime = 0;
    function throttleSavePosition() {
      const now = Date.now();
      if (now - lastSaveTime > 1000) {
        localStorage.setItem('mooji_playback_pos', audio.currentTime);
        lastSaveTime = now;
      }
    }

    // Render lists
    function renderSatsangs(filterText = '') {
      const cleanFilter = filterText.toLowerCase().trim();
      
      const filtered = SATSANGS.map((s, idx) => {
        const matchesSatsang = s.title.toLowerCase().includes(cleanFilter) || s.date.toLowerCase().includes(cleanFilter);
        const matchingTracks = s.tracks.filter(t => t.title.toLowerCase().includes(cleanFilter));
        return {
          ...s,
          originalIdx: idx,
          matchesSelf: matchesSatsang,
          matchingTracksCount: matchingTracks.length,
          firstMatchingTrack: matchingTracks[0] ? matchingTracks[0].title : null
        };
      }).filter(s => s.matchesSelf || s.matchingTracksCount > 0);

      const buildHtml = (items) => {
        if (items.length === 0) {
          return '<div style="padding: 20px; text-align: center; color: var(--text-muted);">No matching Satsangs</div>';
        }
        return items.map(s => {
          const isActive = s.originalIdx === currentSatsangIdx;
          let matchLabel = '';
          if (cleanFilter && s.matchingTracksCount > 0 && !s.matchesSelf) {
            matchLabel = `<span style="font-size: 0.75rem; color: var(--accent); display: block; margin-top: 4px; font-weight: 500;">↳ Matches: "${s.firstMatchingTrack}"${s.matchingTracksCount > 1 ? ` (+${s.matchingTracksCount - 1} more)` : ''}</span>`;
          }
          return `
            <div class="satsang-item ${isActive ? 'active' : ''}" onclick="onSatsangItemClick(${s.originalIdx})">
              <span class="item-date">${s.date}</span>
              <div class="item-title">${s.title}</div>
              ${matchLabel}
              <span class="item-track-count">${s.tracks.length} tracks</span>
            </div>
          `;
        }).join('');
      };

      const html = buildHtml(filtered);
      satsangListEl.innerHTML = html;
      drawerSatsangListEl.innerHTML = html;
    }

    let pendingTrackIdx = null;

      if (idx < 0 || idx >= SATSANGS.length) return;

      // A quick re-render keeps active state perfect
      const activeSearch = searchInput.value || drawerSearchInput.value;
      renderSatsangs(activeSearch);

      const satsang = SATSANGS[idx];
      playerDate.textContent = `${idx + 1}/${SATSANGS.length} - ${satsang.date}`;
      playerSatsangTitle.textContent = satsang.title;

      // If switching satsang, reset track to 0

      if (autoPlay) {
        if (activeSearch) {
          // Find the first track matching the search in the selected Satsang
          const matchIdx = satsang.tracks.findIndex(t => t.title.toLowerCase().includes(activeSearch.toLowerCase().trim()));
          currentTrackIdx = matchIdx !== -1 ? matchIdx : 0;

        const targetTrack = satsang.tracks[trackIdx];
        
        const modal = document.getElementById('confirmModal');
        const modalText = document.getElementById('confirmModalText');
        modalText.innerHTML = `You are listening to:<br><strong>${satsang.date} (Track ${currentTrackIdx + 1}) - ${currentTrack.title}</strong><br><br>Do you want to switch to:<br><strong>${targetTrack.title}</strong>?`;
        modal.classList.add('show');
      } else {
        executeTrackSwitch(trackIdx);
      }
    };

    function executeTrackSwitch(trackIdx) {
      currentTrackIdx = trackIdx;
      renderTracks();
      loadTrack(currentTrackIdx, true);
    }

    // Modal Events Setup
    function setupModalListeners() {
      const modal = document.getElementById('confirmModal');
      const btnCancel = document.getElementById('btnCancelSwitch');
      const btnConfirm = document.getElementById('btnConfirmSwitch');

      btnCancel.addEventListener('click', () => {
        modal.classList.remove('show');
        pendingTrackIdx = null;
        pendingSatsangIdx = null;
      });

      btnConfirm.addEventListener('click', () => {
        modal.classList.remove('show');
        if (pendingTrackIdx !== null) {
          executeTrackSwitch(pendingTrackIdx);
          pendingTrackIdx = null;
        } else if (pendingSatsangIdx !== null) {
          selectSatsang(pendingSatsangIdx, true);
          pendingSatsangIdx = null;
        }
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('show');
          pendingTrackIdx = null;
          pendingSatsangIdx = null;
        }
      });
    }

    // Toast Notification helper
    let toastTimeoutId = null;
    function showToast(message) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimeoutId) clearTimeout(toastTimeoutId);
      toastTimeoutId = setTimeout(() => {
        toast.classList.remove('show');
      }, 4000);
    }

    // Playback Warning Chime (3 synthesized bell sounds)
    function playWarningChime() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContextClass();
        const playChimeNote = (startTime, freq) => {
          const osc = ctx.createOscillator();
          const osc2 = ctx.createOscillator();
          const gainNode = ctx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, startTime);
          
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(freq * 2.76, startTime);
          
          gainNode.gain.setValueAtTime(0, startTime);
          gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.01);
          gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.8);
          
          osc.connect(gainNode);
          osc2.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          osc.start(startTime);
          osc2.start(startTime);
          osc.stop(startTime + 0.8);
          osc2.stop(startTime + 0.8);
        };
        
        const now = ctx.currentTime;
        playChimeNote(now, 880);        // A5
        playChimeNote(now + 0.35, 987.77); // B5
        playChimeNote(now + 0.70, 1174.66); // D6
      } catch (e) {
        console.error("Warning chime failed:", e);
      }
    }

    // Playback Retry Mechanism
    let playRetryCount = 0;
    const MAX_PLAY_RETRIES = 3;
    let retryTimeoutId = null;
    let isRetrying = false;

    function handlePlayFailure(err) {
      console.warn("Playback failure encountered:", err);
      
      // Don't auto-retry/skip if it's browser's autoplay block (NotAllowedError)
      if (err && err.name === 'NotAllowedError') {
        console.log("Autoplay blocked. Waiting for user interaction.");
        return;
      }

      if (isRetrying) {
        console.log("Retry already in progress, ignoring duplicate trigger.");
        return;
      }
      isRetrying = true;

      if (playRetryCount < MAX_PLAY_RETRIES) {
        playRetryCount++;
        const delay = Math.pow(2, playRetryCount) * 1000;
        showToast(`Playback interrupted. Retrying in ${delay / 1000}s... (Attempt ${playRetryCount}/${MAX_PLAY_RETRIES})`);
        
        if (retryTimeoutId) clearTimeout(retryTimeoutId);
        retryTimeoutId = setTimeout(() => {
          isRetrying = false;
          console.log(`Retrying play, attempt ${playRetryCount}...`);
          
          const currentPos = audio.currentTime;
          audio.load();
          if (currentPos > 0) {
            audio.currentTime = currentPos;
          }
          
          initAudioBoost();
          audio.play().then(() => {
            playRetryCount = 0;
            isPlaying = true;
            updatePlayBtnUI();
            showToast("Playback restored!");
          }).catch(retryErr => {
            handlePlayFailure(retryErr);
          });
        }, delay);
      } else {
        isRetrying = false;
        playRetryCount = 0;
        showToast("Playback failed. Please check connection.");
        console.error("Max retries reached. Playing warning chime and pausing track.");
        playWarningChime();
        pauseAudio();
      }
    }

    // Load Track MP3
    function loadTrack(trackIdx, autoPlay = false) {
      const satsang = SATSANGS[currentSatsangIdx];
      if (trackIdx < 0 || trackIdx >= satsang.tracks.length) return;
      
      // Clear retry state when a new track is loaded
      if (retryTimeoutId) {
        clearTimeout(retryTimeoutId);
        retryTimeoutId = null;
      }
      playRetryCount = 0;
      isRetrying = false;
      
      const track = satsang.tracks[trackIdx];
      playerTrackTitle.textContent = track.title;
      
      // Update browser tab title too
      document.title = `${track.title} | Mooji 2010`;
      
      audio.src = track.rel_path;
      audio.load();
      updateMediaSessionMetadata();

      saveState();

      if (autoPlay) {
        playAudio();
      } else {
        pauseAudio();
      }
    }

    // Play/Pause Functions
    function playAudio() {
      // Creating an AudioContext merely to play at normal volume breaks
      // background playback on Android. Only desktop boost needs Web Audio.
      if (isBoostActive) initAudioBoost();
      audio.play().then(() => {
        isPlaying = true;
        updatePlayBtnUI();
        playRetryCount = 0;
        isRetrying = false;
        if (retryTimeoutId) {
          clearTimeout(retryTimeoutId);
          retryTimeoutId = null;
        }
        updateMediaSessionPlaybackState('playing');
      }).catch(err => {
        console.log("Audio play failed / user gesture needed:", err);
        handlePlayFailure(err);
      });
    }

    function pauseAudio() {
      if (retryTimeoutId) {
        clearTimeout(retryTimeoutId);
        retryTimeoutId = null;
      }
      isRetrying = false;
      playRetryCount = 0;
      audio.pause();
      isPlaying = false;
      updatePlayBtnUI();
      updateMediaSessionPlaybackState('paused');
    }

    function togglePlay() {
      if (isPlaying) {
        pauseAudio();
      } else {
        playAudio();
      }
    }

    function updatePlayBtnUI() {
      if (isPlaying) {
        // Pause icon
        playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
      } else {
        // Play icon
        playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
      }
    }

    // Audio Player Listeners
    function setupAudioListeners() {
      audio.addEventListener('timeupdate', () => {
        updateProgressBar();
        throttleSavePosition();
        updateMediaSessionPositionState();
      });

      audio.addEventListener('durationchange', () => {
        timeTotal.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('ended', () => {
        // Keep the transition synchronous with the trusted media event. This
        // is the path Android Chrome allows to continue behind the lock screen.
        nextTrack();
      });

      audio.addEventListener('play', () => {
        isPlaying = true;
        updatePlayBtnUI();
        updateMediaSessionPlaybackState('playing');
      });

      audio.addEventListener('pause', () => {
        // An ended track pauses just before nextTrack starts the replacement;
        // avoid briefly advertising a stopped session in that case.
        if (audio.ended) return;
        isPlaying = false;
        updatePlayBtnUI();
        updateMediaSessionPlaybackState('paused');
      });

      audio.addEventListener('error', (e) => {
        if (!audio.src) return;
        const err = audio.error;
        console.error("Audio element error event:", err);
        handlePlayFailure(err || new Error("Audio error event"));
      });

      setupMediaSession();

      // Persist immediately when Android backgrounds the page. Normal media
      // playback remains native; no screen wake lock (and no battery-draining
      // forced-on display) is required.
      document.addEventListener('visibilitychange', () => {
        saveState();
        if (!document.hidden && isPlaying && audio.paused && !audio.ended) {
          playAudio();
        }
      });
      window.addEventListener('pagehide', saveState);
    }

    function updateMediaSessionPlaybackState(state) {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = state;
      }
    }

    function updateMediaSessionMetadata() {
      if (!('mediaSession' in navigator) || !('MediaMetadata' in window)) return;
      const satsang = SATSANGS[currentSatsangIdx];
      const track = satsang.tracks[currentTrackIdx];
      navigator.mediaSession.metadata = new MediaMetadata({
        title: track.title,
        artist: 'Mooji',
        album: `${satsang.date} — ${satsang.title}`
      });
    }

    function updateMediaSessionPositionState() {
      if (!('mediaSession' in navigator) || !navigator.mediaSession.setPositionState) return;
      if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
      try {
        navigator.mediaSession.setPositionState({
          duration: audio.duration,
          playbackRate: audio.playbackRate,
          position: Math.min(audio.currentTime, audio.duration)
        });
      } catch (e) {
        // Some older Android WebViews expose the API only partially.
      }
    }

    function setupMediaSession() {
      if (!('mediaSession' in navigator)) return;
      const handlers = {
        play: playAudio,
        pause: pauseAudio,
        previoustrack: prevTrack,
        nexttrack: nextTrack,
        seekbackward: (details) => {
          audio.currentTime = Math.max(0, audio.currentTime - (details.seekOffset || 10));
        },
        seekforward: (details) => {
          const end = Number.isFinite(audio.duration) ? audio.duration : audio.currentTime + 10;
          audio.currentTime = Math.min(end, audio.currentTime + (details.seekOffset || 10));
        },
        seekto: (details) => {
          if (Number.isFinite(details.seekTime)) audio.currentTime = details.seekTime;
        }
      };
      Object.entries(handlers).forEach(([action, handler]) => {
        try {
          navigator.mediaSession.setActionHandler(action, handler);
        } catch (e) {
          // Unsupported actions differ between Chrome and Android WebViews.
        }
      });
      updateMediaSessionMetadata();
    }

    // Next Track
    function nextTrack() {
      const satsang = SATSANGS[currentSatsangIdx];
      if (currentTrackIdx < satsang.tracks.length - 1) {
        currentTrackIdx++;
        renderTracks();
        loadTrack(currentTrackIdx, true);
      } else {
        // Go to next satsang
        if (currentSatsangIdx < SATSANGS.length - 1) {
          selectSatsang(currentSatsangIdx + 1, true);
        } else {
          // Loop to first day, first track
          selectSatsang(0, true);
        }
      }
    }

    // Previous Track
    function prevTrack() {
      // If current track has played more than 3 seconds, restart it
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
        return;
      }
      
      if (currentTrackIdx > 0) {
        currentTrackIdx--;
        renderTracks();
        loadTrack(currentTrackIdx, true);
      } else {
        // Go to previous day
        if (currentSatsangIdx > 0) {
          const prevSatsang = SATSANGS[currentSatsangIdx - 1];
          currentTrackIdx = prevSatsang.tracks.length - 1;
          selectSatsang(currentSatsangIdx - 1, false);
          renderTracks();
          loadTrack(currentTrackIdx, true);
        }
      }
    }

    // UI Listeners
    function setupUIListeners() {
      // Buttons
      btnPlay.addEventListener('click', togglePlay);
      btnPrev.addEventListener('click', prevTrack);
      btnNext.addEventListener('click', nextTrack);

      // Search Inputs
      searchInput.addEventListener('input', (e) => {
        renderSatsangs(e.target.value);
      });
      drawerSearchInput.addEventListener('input', (e) => {
        renderSatsangs(e.target.value);
      });

      // Mobile Drawer toggles
      menuOpenBtn.addEventListener('click', openDrawer);
      menuCloseBtn.addEventListener('click', closeDrawer);
      drawerOverlay.addEventListener('click', closeDrawer);

      // Progress Seek Click/Drag
      progressBarWrapper.addEventListener('mousedown', startScrub);
      progressBarWrapper.addEventListener('touchstart', startScrub, { passive: true });

      // Volume Click
      volumeSliderWrapper.addEventListener('click', setVolumeFromClick);
      btnMute.addEventListener('click', toggleMute);
      
      // Boost Click
      document.getElementById('btnBoost').addEventListener('click', toggleBoost);
    }

    // Drawer Helpers
    function openDrawer() {
      mobileDrawer.classList.add('open');
      drawerOverlay.classList.add('open');
    }

    function closeDrawer() {
      mobileDrawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
    }

    // Progress Bar Scrubbing
    let isScrubbing = false;

    function startScrub(e) {
      isScrubbing = true;
      scrub(e);
      window.addEventListener('mousemove', scrub);
      window.addEventListener('mouseup', endScrub);
      window.addEventListener('touchmove', scrub, { passive: true });
      window.addEventListener('touchend', endScrub);
    }

    function scrub(e) {
      if (!isScrubbing) return;
      const rect = progressBarWrapper.getBoundingClientRect();
      let clientX = e.clientX;
      if (e.touches && e.touches[0]) {
        clientX = e.touches[0].clientX;
      }
      
      let percentage = (clientX - rect.left) / rect.width;
      percentage = Math.max(0, Math.min(1, percentage));
      
      progressFill.style.width = `${percentage * 100}%`;
      progressHandle.style.left = `${percentage * 100}%`;
      
      if (audio.duration) {
        const targetTime = percentage * audio.duration;
        timeCurrent.textContent = formatTime(targetTime);
      }
    }

    function endScrub(e) {
      if (!isScrubbing) return;
      isScrubbing = false;
      window.removeEventListener('mousemove', scrub);
      window.removeEventListener('mouseup', endScrub);
      window.removeEventListener('touchmove', scrub);
      window.removeEventListener('touchend', endScrub);

      // Seek audio
      const rect = progressBarWrapper.getBoundingClientRect();
      let clientX = e.clientX;
      if (e.changedTouches && e.changedTouches[0]) {
        clientX = e.changedTouches[0].clientX;
      } else if (e.touches && e.touches[0]) {
        clientX = e.touches[0].clientX;
      }
      
      if (clientX !== undefined) {
        let percentage = (clientX - rect.left) / rect.width;
        percentage = Math.max(0, Math.min(1, percentage));
        if (audio.duration) {
          audio.currentTime = percentage * audio.duration;
          saveState();
        }
      }
    }

    // Format Time Helpers
    function formatTime(secs) {
      if (isNaN(secs)) return "0:00";
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function updateProgressBar() {
      if (isScrubbing) return;
      if (!audio.duration) return;
      
      const percentage = audio.currentTime / audio.duration;
      progressFill.style.width = `${percentage * 100}%`;
      progressHandle.style.left = `${percentage * 100}%`;
      timeCurrent.textContent = formatTime(audio.currentTime);
    }

    // Volume helpers
    function setVolumeFromClick(e) {
      initAudioBoost();
      const rect = volumeSliderWrapper.getBoundingClientRect();
      let percentage = (e.clientX - rect.left) / rect.width;
      percentage = Math.max(0, Math.min(1, percentage));
      volume = percentage;
      isMuted = false;
      updateAudioGain();
      updateVolumeUI();
      saveState();
    }

    function toggleMute() {
      initAudioBoost();
      if (isMuted) {
        volume = prevVolume;
        isMuted = false;
      } else {
        prevVolume = volume;
        isMuted = true;
      }
      updateAudioGain();
      updateVolumeUI();
    }

    function updateVolumeUI() {
      const displayVol = isMuted ? 0 : volume;
      volumeFill.style.width = `${displayVol * 100}%`;
      
      // Update Volume Icon
      if (displayVol === 0) {
        volumeIcon.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
      } else if (displayVol < 0.5) {
        volumeIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>`;
      } else {
        volumeIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
      }
    }
  </script>
</body>
</html>
