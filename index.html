<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#071827">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Pages</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #e8f0f7;
      --line: #244157;
      --paper: #071827;
      --panel: #10283b;
      --accent: #8ecae6;
      --accent-2: #b7e4c7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
    }

    body {
      min-height: 100svh;
      display: grid;
      padding: clamp(12px, 2.5vw, 28px);
      background:
        linear-gradient(135deg, rgba(142, 202, 230, 0.12), transparent 42%),
        linear-gradient(315deg, rgba(32, 73, 105, 0.2), transparent 48%),
        var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(110px, 100%), 1fr));
      grid-auto-rows: 1fr;
      gap: clamp(6px, 1.35vw, 12px);
    }

    a {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: clamp(8px, 1.8vh, 16px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 40, 59, 0.82);
      color: var(--ink);
      text-decoration: none;
      font-size: clamp(0.82rem, 2.6vh, 1.15rem);
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
      overflow-wrap: anywhere;
      transition: border-color 150ms ease, color 150ms ease, transform 150ms ease, background 150ms ease;
    }

    a:hover,
    a:focus-visible {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--panel);
      transform: translateY(-1px);
      outline: none;
    }

    a:nth-child(3n + 2):hover,
    a:nth-child(3n + 2):focus-visible {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }

    @media (max-height: 420px) {
      body {
        gap: 6px;
        padding: 10px;
      }

      a {
        padding: 6px;
        font-size: 0.78rem;
      }
    }
  </style>
</head>
