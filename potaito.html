
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>POTAITO</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A5%94%3C/text%3E%3C/svg%3E">
    <meta name="theme-color" content="#0c1424">
    <meta name="color-scheme" content="dark">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* --- Global Styles & Variables --- */
        :root {
            --primary: #4f7db7;
            --primary-light: #8eb8e8;
            --primary-dark: #33557f;
            --bg-dark: #0c1424;
            --bg-card: rgba(17, 27, 46, 0.82);
            --bg-input: rgba(24, 39, 65, 0.82);
            --text-primary: #eef5ff;
            --text-secondary: #aabbd4;
            --border: rgba(142, 184, 232, 0.2);
            --code-bg: #0b1322;
            --shadow: 0 30px 80px -28px rgba(0, 0, 0, 0.65);
            --glow: 0 0 24px rgba(79, 125, 183, 0.22);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: -webkit-fill-available;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(142, 184, 232, 0.1), transparent 32%),
                radial-gradient(circle at top right, rgba(79, 125, 183, 0.14), transparent 28%),
                linear-gradient(140deg, var(--bg-dark) 0%, #111c31 48%, #09101d 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Background Animation --- */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(232, 242, 255, 0.72), rgba(79, 125, 183, 0.2) 45%, rgba(79, 125, 183, 0.06) 70%);
            opacity: 0.18;
            filter: blur(6px);
            animation: float 10s ease-in-out infinite;
        }

        .floating-orb:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-orb:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }

        .floating-orb:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 10%;
            left: 50%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* --- Layout & Main Components --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .title {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: clamp(2.4rem, 8vw, 4.4rem);
            font-weight: 800;
            letter-spacing: -0.06em;
            background: linear-gradient(135deg, #f4f9ff 0%, var(--primary-light) 35%, var(--primary) 72%, #203b61 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
            animation: glow 2.4s ease-in-out infinite alternate;
            cursor: pointer;
        }

        .title-accent {
            display: inline-block;
            font-weight: 950;
            letter-spacing: -0.09em;
            margin: 0 0.06em 0 -0.01em;
            color: #eef5ff;
            background: linear-gradient(180deg, #ffffff 0%, #c7ddf5 52%, #5d8dc8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 18px rgba(142, 184, 232, 0.18);
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 6px rgba(79, 125, 183, 0.18)); }
            to { filter: drop-shadow(0 0 18px rgba(142, 184, 232, 0.28)); }
        }

        .model-selector {
            margin-top: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(15, 25, 43, 0.7);
            backdrop-filter: blur(14px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .model-selector label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .model-selector select {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.45rem 0.7rem;
            font: inherit;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            overflow: hidden;
            position: relative;
        }

        .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        /* --- Chat Output Area --- */
        .output-area {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.01), rgba(79, 125, 183, 0.03));
            scroll-behavior: auto;
        }

        .output-area::-webkit-scrollbar {
            width: 8px;
        }

        .output-area::-webkit-scrollbar-track {
            background: var(--bg-input);
        }

        .output-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* --- Messages --- */
        .message {
            display: flex;
            margin-bottom: 1.5rem;
            max-width: 100%;
            animation: messageSlide 0.5s ease-out;
            position: relative;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content-wrapper {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        .message-content {
            padding: 0.75rem 1rem;
            border-radius: 16px;
            overflow-wrap: break-word;
            line-height: 1.6;
        }

        .message-content.streaming {
            white-space: pre-wrap;
        }

        .message-content a {
            color: var(--primary-light);
            text-decoration: underline;
            text-decoration-color: rgba(129, 140, 248, 0.5);
            transition: color 0.2s ease, text-decoration-color 0.2s ease;
        }

        .message-content a:hover {
            color: #fff;
            text-decoration-color: #fff;
        }

        .user-message {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            box-shadow: 0 10px 28px rgba(24, 42, 72, 0.36);
        }

        .ai-message {
            margin-right: auto;
        }

        .ai-message .message-content {
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        /* --- Copy Button for Messages --- */
        .message-actions {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 10;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .ai-message .message-content-wrapper:has(pre) .message-actions {
            display: none;
        }

        .copy-message-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 0.75rem;
        }

        .copy-message-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .copy-message-btn.copied {
            background-color: #22c55e;
            color: white;
            border-color: #22c55e;
        }

        /* --- Input Section --- */
        .input-section {
            padding: 1rem;
            background: linear-gradient(to top, rgba(9, 16, 29, 0.86), transparent);
            flex-shrink: 0;
        }

        .input-container {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .prompt-input {
            flex: 1;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            overflow-y: hidden;
            transition: all 0.3s ease;
            line-height: 1.5;
            height: 48px;
            max-height: 120px;
            scrollbar-width: none;
        }

        .prompt-input::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .prompt-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow);
            transform: translateY(-2px);
        }

        .prompt-input::placeholder {
            color: var(--text-secondary);
        }

        .send-button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(24, 42, 72, 0.34);
            flex-shrink: 0;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 16px 40px rgba(24, 42, 72, 0.44);
        }

        .send-button:active:not(:disabled) {
            transform: translateY(0) scale(1);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* --- Send/Stop Icon States --- */
        .send-button .send-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button .stop-icon {
            display: none;
            align-items: center;
            justify-content: center;
        }

        .send-button .stop-square {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 3px;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25);
        }

        .send-button.loading .send-icon {
            display: none;
        }

        .send-button.loading {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.45);
        }

        .send-button.loading .stop-icon {
            display: flex;
            animation: stopPulse 1.1s ease-in-out infinite;
        }

        @keyframes stopPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.9); }
        }

        /* --- Status Bar --- */
        .status-bar {
            position: relative;
            padding: 0.5rem 1rem;
            background: var(--bg-input);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        .status-version {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.68rem;
            line-height: 1;
            color: rgba(170, 187, 212, 0.22);
            letter-spacing: 0.04em;
            user-select: none;
            pointer-events: none;
            white-space: nowrap;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.error { background: #ef4444; }
        .status-dot.processing { background: #f59e0b; }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- Empty State --- */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .empty-state h2 {
            color: var(--text-primary);
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        /* --- Markdown and Code Block Styles --- */
        .message-content pre {
            background-color: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 1rem 0;
            position: relative;
            font-size: 0.9rem;
        }

        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            color: var(--text-secondary);
            border-top-left-radius: 11px;
            border-top-right-radius: 11px;
        }

        .copy-code-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .copy-code-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .copy-code-btn.copied {
            background-color: #22c55e;
            color: white;
            border-color: #22c55e;
        }

        .message-content code {
            font-family: 'Fira Code', 'Courier New', monospace;
        }

        .message-content pre code {
            display: block;
            padding: 1rem;
            overflow-x: auto;
            color: #d1d5db;
        }

        .message-content :not(pre)>code {
            background-color: var(--bg-input);
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            border-radius: 6px;
        }

        /* --- Markdown Content Elements --- */
        .message-content ul, .message-content ol { 
            padding-left: 1.5rem; 
            margin: 1rem 0; 
        }
        
        .message-content li { 
            margin-bottom: 0.5rem; 
        }
        
        .message-content strong { font-weight: 700; }
        .message-content em { font-style: italic; }
        
        .message-content p { margin: 1rem 0; }
        .message-content p:first-child { margin-top: 0; }
        .message-content p:last-child { margin-bottom: 0; }

        .message-content h1, .message-content h2, .message-content h3, .message-content h4 {
            color: var(--primary-light);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            line-height: 1.3;
            font-weight: 600;
        }
        
        .message-content blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            background: rgba(99, 102, 241, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 0 8px 8px 0;
        }

        /* --- Table Styling (New) --- */
        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            overflow: hidden;
            display: block;
            overflow-x: auto;
        }

        .message-content th, .message-content td {
            padding: 0.75rem;
            border: 1px solid var(--border);
            text-align: left;
        }

        .message-content th {
            background-color: rgba(79, 125, 183, 0.12);
            font-weight: 600;
            color: var(--primary-light);
        }

        .message-content tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* --- Desktop-Specific Adjustments --- */
        @media (min-width: 769px) {
            .container { padding: 2rem; }
            .header { margin-bottom: 2rem; }
            .title { font-size: 3.5rem; }
            .model-selector label { font-size: 0.95rem; }
            .output-area { padding: 2rem; }
            .message-content { padding: 1rem 1.5rem; }
            .input-section { padding: 1.5rem; }
            .input-container { gap: 1rem; }
            .prompt-input { padding: 1rem 1.5rem; max-height: 200px; }
            .send-button { width: 52px; height: 52px; }
            .status-bar { padding: 0.75rem 1.5rem; font-size: 0.875rem; }
            /* Better table display on desktop */
            .message-content table { display: table; }
        }

        /* --- Overlay Styles --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(6, 11, 21, 0.82);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.3s, opacity 0.3s ease;
        }

        .overlay.visible {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .overlay-content {
            background-color: rgba(14, 22, 39, 0.96);
            padding: 2rem;
            border-radius: 22px;
            max-width: 600px;
            text-align: center;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        /* --- Reload Button --- */
        .reload-button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(24, 42, 72, 0.34);
            font-size: 28px;
            font-weight: 300;
            line-height: 1;
            flex-shrink: 0;
        }

        .reload-button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 16px 40px rgba(24, 42, 72, 0.44);
        }

        @media (min-width: 769px) {
            .reload-button { width: 52px; height: 52px; font-size: 32px; }
        }
    </style>
</head>

<body>
    <div class="background-animation">
        <div class="floating-orb"></div>
        <div class="floating-orb"></div>
        <div class="floating-orb"></div>
    </div>

    <div id="overlay" class="overlay">
        <div class="overlay-content">
            <p>POTAITO is a webpage that interacts with private<br>(100% locally hosted models)<br>running on an old Dell 🥔 (i5-4310M, 8GB RAM, No GPU, CPU only).</p>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <h1 class="title" id="clickableTitle">POT<span class="title-accent">AI</span>TO</h1>
            <div class="model-selector">
                <label for="modelSelect">Model</label>
                <select id="modelSelect" aria-label="Select model"></select>
            </div>
        </header>

        <main class="chat-container">
            <div class="output-area" id="outputArea" aria-live="polite">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">✨</div>
                    <h2>Start a new conversation</h2>
                    <p>What can I help you with today?</p>
                </div>
            </div>

            <section class="input-section">
                <div class="input-container">
                    <button class="reload-button" id="reloadButton" aria-label="Reload Page" title="Start New Chat">&#43;</button>
                    <textarea class="prompt-input" id="promptInput" placeholder="Ask anything..." rows="1"></textarea>
                    <button class="send-button" id="sendButton" aria-label="Send Message">
                        <span class="send-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </span>
                        <span class="stop-icon" aria-hidden="true"><span class="stop-square"></span></span>
                    </button>
                </div>
            </section>

            <footer class="status-bar">
                <div class="status-row">
                    <div class="status-indicator">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">Ready</span>
                        <span id="responseTime" style="margin-left: 0.5rem;"></span>
                    </div>
                    <div class="status-meta">
                        <div id="tokenCount">0 tokens</div>
                    </div>
                    <div class="status-version" aria-label="Version">1.04</div>
                </div>
            </footer>
        </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chat = new LLMChat();
            
            // UI interactions for Title and Overlay
            const clickableTitle = document.getElementById('clickableTitle');
            const overlay = document.getElementById('overlay');
            const reloadButton = document.getElementById('reloadButton');

            clickableTitle.addEventListener('click', () => overlay.classList.add('visible'));
            overlay.addEventListener('click', () => overlay.classList.remove('visible'));
            reloadButton.addEventListener('click', () => {
                window.localStorage.removeItem(CHAT_HISTORY_STORAGE_KEY);
                location.reload();
            });
        });

        const OLLAMA_API_URL = 'https://2821-174-95-2-90.ngrok-free.app/api/chat';
        const SMOL_OLLAMA_MODEL = 'Impulse2000/smollm3:latest';
        const QWEN_3_5_2B_MODEL = 'qwen3.5:2b';
        const LEGACY_GEMMA_MODEL = 'gemma3:4b';
        const CURRENT_GEMMA_MODEL = 'gemma3n:e2b';
        const GEMMA3_1B_MODEL = 'gemma3:1b';
        const AVAILABLE_OLLAMA_MODELS = [
            SMOL_OLLAMA_MODEL,
            'llama3.2:3b-instruct-q4_K_M',
            'phi4-mini:latest',
            QWEN_3_5_2B_MODEL,
            CURRENT_GEMMA_MODEL,
            GEMMA3_1B_MODEL
        ];
        const MODEL_FRIENDLY_NAMES = {
            [SMOL_OLLAMA_MODEL]: 'SmolLM3',
            'llama3.2:3b-instruct-q4_K_M': 'Llama-3.2-3B',
            'phi4-mini:latest': 'Phi4-mini',
            [QWEN_3_5_2B_MODEL]: 'Qwen 3.5 2B',
            [CURRENT_GEMMA_MODEL]: 'Gemma3n-e2b',
            [GEMMA3_1B_MODEL]: 'Gemma3 1B'
        };
        const DEFAULT_OLLAMA_MODEL = 'phi4-mini:latest';
        const MODEL_STORAGE_KEY = 'weblocai-selected-model';
        const CHAT_HISTORY_STORAGE_KEY = 'potaito-chat-history';
        const MAX_CONTEXT_MESSAGES = 10;
        const MAX_SAVED_HISTORY_MESSAGES = 100;

        class LLMChat {
            #elements = {};
            #isProcessing = false;
            #abortController = null;
            #streamReader = null;
            #pendingUserAbort = false;
            #history = [];
            #selectedModel = DEFAULT_OLLAMA_MODEL;
            #wakeLock = null;
            #wakeLockSupported = 'wakeLock' in navigator;
            #wakeLockReacquirePending = false;
            #streamRenderScheduled = false;
            #streamScrollScheduled = false;

            constructor() {
                this.#initializeElements();
                this.#restoreHistory();
                this.#bindEvents();
                this.#configureMarkdown();
                this.#updateStatus('Ready', 'success');
            }

            #initializeElements() {
                this.#elements = {
                    outputArea: document.getElementById('outputArea'),
                    promptInput: document.getElementById('promptInput'),
                    sendButton: document.getElementById('sendButton'),
                    statusDot: document.getElementById('statusDot'),
                    statusText: document.getElementById('statusText'),
                    tokenCount: document.getElementById('tokenCount'),
                    modelSelect: document.getElementById('modelSelect'),
                    emptyState: document.getElementById('emptyState'),
                    responseTime: document.getElementById('responseTime')
                };

                this.#populateModelOptions();

                const savedModel = this.#getNormalizedSavedModel();
                if (savedModel && this.#elements.modelSelect) {
                    const matchingOption = Array.from(this.#elements.modelSelect.options)
                        .some((option) => option.value === savedModel);
                    if (matchingOption) {
                        this.#elements.modelSelect.value = savedModel;
                    }
                }

                if (this.#elements.modelSelect?.value) {
                    this.#selectedModel = this.#elements.modelSelect.value;
                }
            }

            #restoreHistory() {
                const rawHistory = window.localStorage.getItem(CHAT_HISTORY_STORAGE_KEY);
                if (!rawHistory) return;

                try {
                    const parsedHistory = JSON.parse(rawHistory);
                    if (!Array.isArray(parsedHistory)) return;

                    const validHistory = parsedHistory
                        .filter((message) => message && (message.role === 'user' || message.role === 'assistant') && typeof message.content === 'string')
                        .slice(-MAX_SAVED_HISTORY_MESSAGES);

                    if (!validHistory.length) return;

                    this.#history = validHistory;
                    validHistory.forEach((message) => {
                        this.#addMessage(message.content, message.role, { scroll: false });
                    });
                    this.#scrollToBottom();
                } catch (_error) {
                    window.localStorage.removeItem(CHAT_HISTORY_STORAGE_KEY);
                }
            }

            #persistHistory() {
                try {
                    window.localStorage.setItem(
                        CHAT_HISTORY_STORAGE_KEY,
                        JSON.stringify(this.#history.slice(-MAX_SAVED_HISTORY_MESSAGES))
                    );
                } catch (_error) {
                    // Ignore storage failures.
                }
            }

            #getNormalizedSavedModel() {
                const savedModel = window.localStorage.getItem(MODEL_STORAGE_KEY);
                if (savedModel === LEGACY_GEMMA_MODEL) {
                    window.localStorage.setItem(MODEL_STORAGE_KEY, CURRENT_GEMMA_MODEL);
                    return CURRENT_GEMMA_MODEL;
                }

                return savedModel;
            }

            #populateModelOptions() {
                if (!this.#elements.modelSelect) return;

                this.#elements.modelSelect.innerHTML = AVAILABLE_OLLAMA_MODELS
                    .map((model) => {
                        const label = MODEL_FRIENDLY_NAMES[model] ?? model;
                        return `<option value="${model}">${label}</option>`;
                    })
                    .join('');

                if (AVAILABLE_OLLAMA_MODELS.includes(DEFAULT_OLLAMA_MODEL)) {
                    this.#elements.modelSelect.value = DEFAULT_OLLAMA_MODEL;
                }
            }

            #bindEvents() {
                // Send button click
                this.#elements.sendButton.addEventListener('click', () => {
                    if (this.#isProcessing) {
                        this.#cancelActiveRequest();
                        return;
                    }
                    this.#sendMessage();
                });

                // Enter key (submit) / Shift+Enter (newline)
                this.#elements.promptInput.addEventListener('keydown', (e) => {
                    const isMobile = window.matchMedia('(pointer: coarse)').matches;
                    if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
                        e.preventDefault();
                        this.#sendMessage();
                    }
                });

                // Auto-resize textarea
                this.#elements.promptInput.addEventListener('input', () => {
                    this.#updateTokenCount();
                    this.#autoResizeTextarea();
                });

                this.#elements.modelSelect?.addEventListener('change', (event) => {
                    this.#selectedModel = event.target.value;
                    window.localStorage.setItem(MODEL_STORAGE_KEY, this.#selectedModel);
                });

                document.addEventListener('visibilitychange', () => {
                    this.#handleVisibilityChange();
                });

                // Copy buttons delegation
                this.#elements.outputArea.addEventListener('click', (e) => {
                    const button = e.target.closest('button');
                    if (!button) return;

                    if (button.classList.contains('copy-code-btn')) {
                        this.#handleCopyCodeClick(button);
                    }
                    if (button.classList.contains('copy-message-btn')) {
                        this.#handleCopyMessageClick(button);
                    }
                });
            }
            
            #configureMarkdown() {
                if (typeof marked !== 'undefined') {
                    // Custom renderer to maintain the specific Code Block UI (Header + Copy Button)
                    const renderer = {
                        code(code, infostring, escaped) {
                            const lang = (infostring || '').match(/\S*/)[0];
                            // Manual escaping for the content inside code
                            const escapedCode = code.replace(/&/g, '&amp;')
                                                    .replace(/</g, '&lt;')
                                                    .replace(/>/g, '&gt;');
                            
                            return `
                                <pre>
                                    <div class="code-block-header">
                                        <span>${lang || 'text'}</span>
                                        <button class="copy-code-btn">Copy</button>
                                    </div>
                                    <code>${escapedCode}</code>
                                </pre>
                            `;
                        }
                    };

                    marked.use({ renderer });
                    
                    // Set options: GFM (GitHub Flavored Markdown) enables tables
                    marked.setOptions({
                        breaks: true, // Convert \n to <br>
                        gfm: true
                    });
                }
            }

            #updateStatus(text, type = 'success') {
                this.#elements.statusText.textContent = text;
                this.#elements.statusDot.className = `status-dot ${type}`;
            }

            #toggleLoading(isLoading) {
                this.#isProcessing = isLoading;
                this.#elements.promptInput.disabled = isLoading;
                this.#elements.sendButton.classList.toggle('loading', isLoading);
                this.#elements.sendButton.setAttribute('aria-label', isLoading ? 'Stop Generation' : 'Send Message');
                this.#elements.sendButton.title = isLoading ? 'Stop' : 'Send';
            }

            #cancelActiveRequest() {
                if (!this.#isProcessing) return;

                this.#pendingUserAbort = true;
                this.#updateStatus('Cancelling...', 'processing');

                if (this.#streamReader) {
                    this.#streamReader.cancel('user_cancelled').catch(() => {});
                }
                if (this.#abortController) {
                    this.#abortController.abort();
                }
            }

            async #requestWakeLock() {
                if (!this.#wakeLockSupported || !this.#isProcessing || document.visibilityState !== 'visible') {
                    return;
                }

                try {
                    if (this.#wakeLock) {
                        return;
                    }

                    const sentinel = await navigator.wakeLock.request('screen');
                    this.#wakeLock = sentinel;
                    this.#wakeLockReacquirePending = false;

                    sentinel.addEventListener('release', () => {
                        if (this.#wakeLock === sentinel) {
                            this.#wakeLock = null;
                        }

                        if (this.#isProcessing && document.visibilityState === 'visible') {
                            this.#wakeLockReacquirePending = true;
                            queueMicrotask(() => {
                                if (this.#wakeLockReacquirePending) {
                                    this.#requestWakeLock().catch(() => {});
                                }
                            });
                        }
                    });
                } catch (error) {
                    this.#wakeLock = null;
                    this.#wakeLockReacquirePending = false;
                    console.warn('Wake lock request failed:', error);
                }
            }

            async #releaseWakeLock() {
                this.#wakeLockReacquirePending = false;

                if (!this.#wakeLock) {
                    return;
                }

                const sentinel = this.#wakeLock;
                this.#wakeLock = null;

                try {
                    await sentinel.release();
                } catch (_error) {
                    // Ignore release failures; the browser may have already released it.
                }
            }

            #handleVisibilityChange() {
                if (!this.#wakeLockSupported) {
                    return;
                }

                if (document.visibilityState === 'visible') {
                    if (this.#isProcessing) {
                        this.#requestWakeLock().catch(() => {});
                    }
                    return;
                }

                this.#releaseWakeLock().catch(() => {});
            }

            async #sendMessage() {
                const prompt = this.#elements.promptInput.value.trim();
                
                if (!prompt || this.#isProcessing) return;

                // 1. Prepare UI
                this.#toggleLoading(true);
                this.#updateStatus('Processing', 'processing');
                this.#elements.responseTime.textContent = '';
                
                // Add User Message
                this.#addMessage(prompt, 'user');
                
                // Clear input
                this.#elements.promptInput.value = '';
                this.#autoResizeTextarea();
                this.#updateTokenCount();
                this.#history.push({ role: 'user', content: prompt });
                this.#persistHistory();

                const startTime = performance.now();
                const streamingMessage = this.#createStreamingMessage();
                let aiText = '';
                const abortController = new AbortController();
                const requestMessages = this.#getRequestMessages();

                this.#pendingUserAbort = false;
                this.#abortController = abortController;
                this.#streamReader = null;

                try {
                    await this.#requestWakeLock();

                    const response = await fetch(OLLAMA_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        signal: abortController.signal,
                        body: JSON.stringify({
                            model: this.#selectedModel,
                            messages: requestMessages,
                            stream: true,
                            ...(this.#selectedModel === QWEN_3_5_2B_MODEL && { think: false }),
                            keep_alive: -1
                        })
                    });

                    if (!response.ok) {
                        throw await this.#createDetailedError(response);
                    }

                    if (!response.body) {
                        throw new Error('Missing response body for streaming');
                    }

                    this.#updateStatus('Streaming...', 'processing');

                    const reader = response.body.getReader();
                    this.#streamReader = reader;
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let streamDone = false;

                    while (!streamDone) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed) continue;

                            try {
                                const payload = trimmed.startsWith('data:')
                                    ? trimmed.slice(5).trim()
                                    : trimmed;

                                if (!payload || payload === '[DONE]') {
                                    streamDone = true;
                                    break;
                                }

                                const parsed = JSON.parse(payload);
                                const token = parsed.message?.content || '';
                                if (token) {
                                    aiText += token;
                                    this.#updateStreamingMessage(streamingMessage, aiText);
                                }

                                if (parsed.done) {
                                    streamDone = true;
                                    break;
                                }
                            } catch (_error) {
                                // Ignore partial/invalid JSON chunks.
                            }
                        }
                    }

                    if (!streamDone && buffer.trim()) {
                        try {
                            const payload = buffer.trim().startsWith('data:')
                                ? buffer.trim().slice(5).trim()
                                : buffer.trim();
                            const parsed = JSON.parse(payload);
                            const token = parsed.message?.content || '';
                            if (token) {
                                aiText += token;
                                this.#updateStreamingMessage(streamingMessage, aiText);
                            }
                        } catch (_error) {
                            // Ignore trailing non-JSON buffer.
                        }
                    }

                    const text = aiText.trim();
                    if (!text) {
                        throw new Error('No content returned from model');
                    }

                    this.#history.push({ role: 'assistant', content: text });
                    this.#persistHistory();

                    // 4. Calculate time and display
                    const duration = ((performance.now() - startTime) / 1000).toFixed(2);
                    this.#elements.responseTime.textContent = `(${duration}s)`;

                    // 5. Finalize AI Message with markdown rendering
                    this.#finalizeStreamingMessage(streamingMessage, text);
                    this.#updateStatus('Ready', 'success');

                } catch (error) {
                    const wasCancelled = this.#pendingUserAbort || abortController.signal.aborted || error?.name === 'AbortError';

                    if (wasCancelled) {
                        if (!aiText.trim()) {
                            this.#removeStreamingMessage(streamingMessage);
                        } else {
                            const partialText = aiText.trim();
                            this.#finalizeStreamingMessage(streamingMessage, partialText);
                            this.#history.push({ role: 'assistant', content: partialText });
                            this.#persistHistory();
                        }
                        const duration = ((performance.now() - startTime) / 1000).toFixed(2);
                        this.#elements.responseTime.textContent = `(${duration}s)`;
                        this.#updateStatus('Cancelled', 'success');
                        return;
                    }

                    console.error('Fetch error:', error);
                    if (!aiText) {
                        this.#removeStreamingMessage(streamingMessage);
                    } else {
                        this.#finalizeStreamingMessage(streamingMessage, aiText);
                    }
                    this.#history.pop();
                    this.#persistHistory();
                    this.#addMessage(this.#formatErrorMessage(error), 'ai');
                    this.#updateStatus('Error', 'error');
                } finally {
                    await this.#releaseWakeLock();
                    this.#streamReader = null;
                    this.#abortController = null;
                    this.#pendingUserAbort = false;
                    this.#toggleLoading(false);
                }
            }

            #createStreamingMessage() {
                if (this.#elements.emptyState) {
                    this.#elements.emptyState.remove();
                    this.#elements.emptyState = null;
                }

                const messageWrapper = document.createElement('div');
                messageWrapper.className = 'message ai-message';
                messageWrapper.innerHTML = `
    <div class="message-content-wrapper">
        <div class="message-actions">
            <button class="copy-message-btn" title="Copy message">Copy</button>
        </div>
        <div class="message-content" data-raw=""></div>
    </div>
`;

                this.#elements.outputArea.appendChild(messageWrapper);
                this.#scrollToBottom();

                return {
                    wrapper: messageWrapper,
                    contentDiv: messageWrapper.querySelector('.message-content'),
                    pendingText: '',
                    lastRenderedText: '',
                    isFinalized: false
                };
            }

            #updateStreamingMessage(streamingMessage, content) {
                if (!streamingMessage?.contentDiv || streamingMessage.isFinalized) return;

                streamingMessage.pendingText = content;
                streamingMessage.contentDiv.classList.add('streaming');
                streamingMessage.contentDiv.setAttribute('data-raw', content);

                if (this.#streamRenderScheduled) return;

                this.#streamRenderScheduled = true;
                requestAnimationFrame(() => {
                    this.#streamRenderScheduled = false;
                    if (!streamingMessage?.contentDiv || streamingMessage.isFinalized) return;
                    if (streamingMessage.lastRenderedText === streamingMessage.pendingText) return;

                    streamingMessage.lastRenderedText = streamingMessage.pendingText;
                    streamingMessage.contentDiv.textContent = streamingMessage.pendingText;
                    this.#scheduleScrollToBottom();
                });
            }

            #finalizeStreamingMessage(streamingMessage, content) {
                if (!streamingMessage?.contentDiv) return;

                streamingMessage.isFinalized = true;
                streamingMessage.pendingText = content;
                streamingMessage.lastRenderedText = content;

                let finalContent = `<p>${this.#escapeHtml(content).replace(/\n/g, '<br>')}</p>`;
                if (typeof marked !== 'undefined') {
                    finalContent = marked.parse(content);
                }

                streamingMessage.contentDiv.classList.remove('streaming');
                streamingMessage.contentDiv.innerHTML = finalContent;
                streamingMessage.contentDiv.setAttribute('data-raw', content);
                this.#scrollToBottom();
            }

            #removeStreamingMessage(streamingMessage) {
                if (streamingMessage?.wrapper?.parentNode) {
                    streamingMessage.wrapper.remove();
                }
            }

            #getRequestMessages() {
                const messages = this.#history.slice(-MAX_CONTEXT_MESSAGES);

                if (this.#shouldDisableThinkingForSelectedModel()) {
                    return [
                        { role: 'system', content: '/no_think' },
                        ...messages
                    ];
                }

                return messages;
            }

            #shouldDisableThinkingForSelectedModel() {
                return this.#selectedModel === SMOL_OLLAMA_MODEL;
            }

            async #createDetailedError(response) {
                const rawBody = await response.text();
                let parsedBody = null;

                if (rawBody) {
                    try {
                        parsedBody = JSON.parse(rawBody);
                    } catch (_error) {
                        parsedBody = null;
                    }
                }

                const details = parsedBody ?? rawBody;
                const message = parsedBody?.error
                    || parsedBody?.message
                    || parsedBody?.detail
                    || response.statusText
                    || `HTTP ${response.status}`;

                const error = new Error(message);
                error.name = 'ModelRequestError';
                error.status = response.status;
                error.statusText = response.statusText;
                error.details = details;
                return error;
            }

            #formatErrorMessage(error) {
                const statusLine = error?.status
                    ? `- Status: \`${error.status}${error.statusText ? ` ${error.statusText}` : ''}\``
                    : '- Status: `Request failed before a valid response was received`';

                const detailText = this.#stringifyErrorDetails(error?.details);
                const detailBlock = detailText
                    ? `\n- Details:\n\`\`\`text\n${detailText}\n\`\`\``
                    : '';

                return [
                    '## Request Failed',
                    '',
                    `- Message: ${error?.message || 'Unknown error'}`,
                    statusLine,
                    detailBlock,
                    '',
                    '🔄️ Try starting a new chat.'
                ].join('\n');
            }

            #stringifyErrorDetails(details) {
                if (!details) return '';
                if (typeof details === 'string') return details.trim().slice(0, 4000);

                try {
                    return JSON.stringify(details, null, 2).slice(0, 4000);
                } catch (_error) {
                    return String(details).slice(0, 4000);
                }
            }

            #addMessage(content, role, options = {}) {
                const { scroll = true } = options;

                if (this.#elements.emptyState) {
                    this.#elements.emptyState.remove();
                    this.#elements.emptyState = null;
                }

                const messageWrapper = document.createElement('div');
                messageWrapper.className = `message ${role}-message`;

                // Use Marked.js if available for AI messages, otherwise fallback to simple text
                let finalContent = content;
                
                if (role === 'user') {
                     // Simple escape for user messages
                     finalContent = `<p>${this.#escapeHtml(content).replace(/\n/g, '<br>')}</p>`;
                } else if (typeof marked !== 'undefined') {
                    // Parse Markdown using marked.js
                    finalContent = marked.parse(content);
                } else {
                    // Fallback if marked didn't load (unlikely)
                    finalContent = `<p>${this.#escapeHtml(content).replace(/\n/g, '<br>')}</p>`;
                }

              messageWrapper.innerHTML = `
    <div class="message-content-wrapper">
        <div class="message-actions">
            <button class="copy-message-btn" title="Copy message">Copy</button>
        </div>
        <div class="message-content" data-raw="${content.replace(/"/g, '&quot;')}">${finalContent}</div>
    </div>
`;

                this.#elements.outputArea.appendChild(messageWrapper);
                
                if (scroll) {
                    this.#scrollToBottom();
                }
            }

            /* --- Utilities: Resize, Token Count --- */

            #autoResizeTextarea() {
                const textarea = this.#elements.promptInput;
                textarea.style.height = 'auto';
                const newHeight = Math.min(textarea.scrollHeight, 200);
                textarea.style.height = `${newHeight}px`;
                textarea.style.overflowY = textarea.scrollHeight > newHeight ? 'auto' : 'hidden';
            }

            #updateTokenCount() {
                const text = this.#elements.promptInput.value;
                this.#elements.tokenCount.textContent = `${Math.ceil(text.length / 4)} tokens`;
            }

            #escapeHtml(text) {
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            #scrollToBottom() {
                this.#elements.outputArea.scrollTop = this.#elements.outputArea.scrollHeight;
            }

            #scheduleScrollToBottom() {
                if (this.#streamScrollScheduled) return;

                this.#streamScrollScheduled = true;
                requestAnimationFrame(() => {
                    this.#streamScrollScheduled = false;
                    this.#scrollToBottom();
                });
            }

        #handleCopyMessageClick(button) {
    // Look for the data-raw attribute we just added
    const contentDiv = button.closest('.message-content-wrapper').querySelector('.message-content');
    const rawContent = contentDiv.getAttribute('data-raw') || contentDiv.innerText;

    navigator.clipboard.writeText(rawContent).then(() => {
        const originalText = button.innerText;
        button.innerText = 'Copied!';
        button.classList.add('copied');
        setTimeout(() => {
            button.innerText = originalText;
            button.classList.remove('copied');
        }, 2000);
    });
}

            #handleCopyCodeClick(button) {
                const code = button.closest('pre').querySelector('code').innerText;
                navigator.clipboard.writeText(code).then(() => {
                    button.textContent = 'Copied!';
                    button.classList.add('copied');
                    setTimeout(() => {
                        button.textContent = 'Copy';
                        button.classList.remove('copied');
                    }, 2000);
                });
            }
        }
    </script>
</body>
</html>
