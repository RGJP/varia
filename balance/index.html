<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Balance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef6ef;
      --bg-deep: #d7e7dc;
      --ink: #17332e;
      --muted: #62726c;
      --soft: #f8fbf5;
      --card: rgba(255, 252, 244, 0.88);
      --card-strong: #fffaf0;
      --line: rgba(45, 76, 66, 0.14);
      --teal: #4f8780;
      --teal-dark: #2f6e68;
      --sage: #cfdcc7;
      --gold: #c59f43;
      --sand: #eee4cf;
      --rose: #c37d68;
      --shadow: 0 18px 50px rgba(28, 57, 49, 0.16);
      --small-shadow: 0 8px 24px rgba(28, 57, 49, 0.10);
      --radius: 18px;
      --screen-max: 480px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 0%, rgba(197, 159, 67, 0.16), transparent 30rem),
        linear-gradient(145deg, #eff6ef 0%, #f8f3e7 46%, #dcece6 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0)),
        var(--bg);
      padding: 0;
    }

    button {
      border: 0;
      font: inherit;
      color: inherit;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(244, 251, 244, 0.94), rgba(237, 247, 239, 0.96)),
        var(--bg);
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: max(14px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 18% 20%, rgba(236, 228, 190, 0.26), transparent 9rem),
        linear-gradient(135deg, #4e8881 0%, #2f6f69 100%);
      color: #f8fff8;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      box-shadow: 0 10px 28px rgba(37, 89, 82, 0.24);
    }

    .brand-row,
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .brand-mark {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      font-size: 16px;
      line-height: 1;
      text-align: center;
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.42rem, 7vw, 2rem);
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0;
    }

    .breath-toggle:active {
      transform: scale(0.96);
    }

    .meta-row {
      margin-top: 12px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.86);
      flex-wrap: wrap;
      row-gap: 6px;
    }

    .date-pill,
    .streak {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .topbar-inner,
    .content {
      width: min(100%, 980px);
      margin: 0 auto;
    }

    main {
      scrollbar-width: none;
      padding: 14px max(12px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    main::-webkit-scrollbar {
      display: none;
    }

    .section {
      margin: 0 0 10px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius);
      box-shadow: var(--small-shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .section-head {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px 7px;
    }

    .section-title {
      margin: 0;
      font-size: 0.76rem;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .duration-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex: 0 0 auto;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(79, 135, 128, 0.12);
      color: var(--teal-dark);
      font-size: 0.68rem;
      line-height: 1;
      font-weight: 850;
      white-space: nowrap;
    }

    .duration-pill::before {
      content: "";
      width: 11px;
      height: 11px;
      border: 1.6px solid currentColor;
      border-radius: 50%;
      background:
        linear-gradient(currentColor, currentColor) 50% 22% / 1.4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 66% 58% / 4px 1.4px no-repeat;
    }

    .section-actions {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      flex: 0 0 auto;
    }

    .reroll-button {
      width: 30px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid rgba(79, 135, 128, 0.26);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--teal-dark);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .reroll-button:hover {
      transform: rotate(24deg);
      background: rgba(79, 135, 128, 0.12);
      border-color: rgba(79, 135, 128, 0.42);
    }

    .reroll-button svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .quotes {
      display: grid;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .quote-card {
      min-height: 96px;
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.76), rgba(239, 229, 204, 0.88)),
        var(--sand);
      border: 1px solid rgba(118, 88, 37, 0.08);
      padding: clamp(12px, 4vw, 18px);
      display: grid;
      align-content: center;
      gap: 7px;
    }

    blockquote {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1rem, 5vw, 1.34rem);
      line-height: 1.12;
      text-align: center;
      text-wrap: balance;
    }

    cite {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-style: normal;
      font-weight: 800;
      text-align: center;
    }

    .mantra {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.05rem, 5vw, 1.42rem);
      line-height: 1.12;
      text-align: center;
      text-wrap: balance;
    }

    .mantra a {
      color: inherit;
      text-decoration-color: rgba(79, 135, 128, 0.44);
      text-underline-offset: 4px;
    }

    .mantra a:hover,
    .mantra a:focus-visible {
      color: var(--teal-dark);
      text-decoration-color: currentColor;
    }

    .mantra-note {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-align: center;
    }

    .two-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .practice-card {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(52px, 0.8fr) minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid var(--line);
    }

    .pose-card {
      grid-template-columns: 1fr;
      gap: 7px;
      align-items: start;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      background: #e5eddf;
      display: grid;
      place-items: center;
      cursor: zoom-in;
    }

    .pose-card .thumb {
      aspect-ratio: 4 / 3;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .zoom-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      background: rgba(16, 31, 28, 0.76);
      backdrop-filter: blur(18px);
      cursor: zoom-out;
    }

    .zoom-overlay.open {
      display: grid;
    }

    .zoom-overlay img {
      width: min(100%, 760px);
      max-height: 86vh;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(250, 252, 245, 0.92);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
    }

    .mudra .thumb img {
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .practice-text {
      min-width: 0;
    }

    .practice-title {
      margin: 0 0 3px;
      font-size: clamp(0.76rem, 3.3vw, 0.9rem);
      line-height: 1.1;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .practice-title a {
      color: inherit;
      text-decoration-color: rgba(79, 135, 128, 0.44);
      text-underline-offset: 3px;
    }

    .practice-title a:hover,
    .practice-title a:focus-visible {
      color: var(--teal-dark);
      text-decoration-color: currentColor;
    }

    .sanskrit {
      color: var(--teal-dark);
      font-size: 0.66rem;
      line-height: 1.1;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
    }

    .practice-copy {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.68rem, 3vw, 0.78rem);
      line-height: 1.22;
    }

    .track-card {
      margin: 0 10px 10px;
      border-radius: 15px;
      overflow: hidden;
      background: #2f2a20;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .track-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: 0;
    }

    .track-caption {
      margin: 0;
      padding: 8px 10px 10px;
      color: #f8ead0;
      font-size: 0.74rem;
      line-height: 1.25;
    }

    .breath-panel {
      padding: 0 12px 16px;
    }

    .breath-prompt {
      margin: 10px 0 0;
      color: var(--muted);
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .breathing.is-active .breath-prompt {
      display: none;
    }

    .breath-stage {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 8px;
      min-height: 160px;
    }

    .breath-toggle {
      justify-self: center;
      width: min(36vw, 138px);
      aspect-ratio: 1;
      border-radius: 999px;
      cursor: pointer;
      color: #f7fffb;
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.45), transparent 32%),
        linear-gradient(145deg, #78a39b, #2f6f69);
      box-shadow: 0 14px 34px rgba(47, 111, 105, 0.32);
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }

    .breath-progress {
      justify-self: center;
      width: min(44vw, 172px);
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        conic-gradient(var(--gold) var(--session-progress, 0%), rgba(79, 135, 128, 0.14) 0);
      padding: 6px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.58);
    }

    .breath-progress-inner {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      display: grid;
      place-items: center;
      background: rgba(245, 251, 241, 0.84);
    }

    .breath-toggle::before,
    .breath-toggle::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: inherit;
      background: rgba(87, 139, 132, 0.22);
      z-index: -1;
      transform: scale(0.92);
      transition: transform 5s ease-in-out, opacity 5s ease-in-out;
    }

    .breath-toggle::after {
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: transparent;
    }

    .breathing.inhale .breath-toggle::before,
    .breathing.inhale .breath-toggle::after {
      transform: scale(1.16);
      opacity: 0.86;
    }

    .breathing.exhale .breath-toggle::before,
    .breathing.exhale .breath-toggle::after {
      transform: scale(0.88);
      opacity: 0.44;
    }

    .breath-label {
      display: grid;
      justify-items: center;
      gap: 4px;
      font-weight: 900;
      line-height: 1;
    }

    .breath-label strong {
      font-size: clamp(1.7rem, 9vw, 2.5rem);
      letter-spacing: 0;
    }

    .breath-label span {
      font-size: 0.68rem;
      letter-spacing: 0.06em;
    }

    svg {
      display: block;
      width: 1em;
      height: 1em;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (min-width: 720px) {
      main {
        padding-top: 18px;
      }

      .content {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        align-items: start;
      }

      .section {
        margin-bottom: 0;
      }

      .section:first-child,
      #breathing {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 360px) {
      .two-grid {
        grid-template-columns: 1fr;
      }

      .practice-card {
        grid-template-columns: 82px 1fr;
      }

      .pose-card {
        grid-template-columns: 92px 1fr;
      }

      .pose-card .thumb {
        aspect-ratio: 1;
      }

      .breath-stage {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <div class="brand" aria-label="Balance">
            <span class="brand-mark" aria-hidden="true">⚖️</span>
            <h1>Balance</h1>
          </div>
        </div>
        <div class="meta-row">
          <span class="streak">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v20"/><path d="m17 5-5-3-5 3"/><path d="m17 19-5 3-5-3"/></svg>
            Daily Ritual
          </span>
          <time class="date-pill" id="today"></time>
        </div>
      </div>
    </header>

    <main>
      <div class="content">
        <section class="section" aria-labelledby="quotes-title">
        <div class="section-head">
          <h2 class="section-title" id="quotes-title">Quote and Mantra of the Day</h2>
          <button class="reroll-button" type="button" data-reroll="quotes" aria-label="Reroll quote and mantra" title="Reroll quote and mantra">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18 2v4h4"/><path d="M6 22v-4H2"/></svg>
          </button>
        </div>
        <div class="quotes" id="quotes"></div>
        </section>

        <section class="section" aria-labelledby="mudras-title">
        <div class="section-head">
          <h2 class="section-title" id="mudras-title">Mudras of the Day</h2>
          <div class="section-actions">
            <span class="duration-pill" aria-label="Suggested duration 3 minutes">3 min</span>
            <button class="reroll-button" type="button" data-reroll="mudras" aria-label="Reroll mudras" title="Reroll mudras">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18 2v4h4"/><path d="M6 22v-4H2"/></svg>
            </button>
          </div>
        </div>
        <div class="two-grid" id="mudras"></div>
        </section>

        <section class="section" aria-labelledby="poses-title">
        <div class="section-head">
          <h2 class="section-title" id="poses-title">Yoga Poses of the Day</h2>
          <div class="section-actions">
            <span class="duration-pill" aria-label="Suggested duration 3 minutes">3 min</span>
            <button class="reroll-button" type="button" data-reroll="poses" aria-label="Reroll yoga poses" title="Reroll yoga poses">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18 2v4h4"/><path d="M6 22v-4H2"/></svg>
            </button>
          </div>
        </div>
        <div class="two-grid" id="poses"></div>
        </section>

        <section class="section" aria-labelledby="track-title">
        <div class="section-head">
          <h2 class="section-title" id="track-title">Ecstatic Dance Track</h2>
          <div class="section-actions">
            <span class="duration-pill" aria-label="Suggested duration 5 minutes">5 min</span>
            <button class="reroll-button" type="button" data-reroll="dance" aria-label="Reroll ecstatic dance track" title="Reroll ecstatic dance track">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18 2v4h4"/><path d="M6 22v-4H2"/></svg>
            </button>
          </div>
        </div>
        <div class="track-card">
          <iframe
            id="danceFrame"
            class="track-frame"
            src="https://www.youtube-nocookie.com/embed/2OEL4P1Rz04?rel=0"
            title="Ecstatic dance track of the day"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
          <p class="track-caption">Move intuitievely for 5 minutes to free your body</p>
        </div>
        </section>

        <section class="section breathing exhale" id="breathing" aria-labelledby="breath-title">
        <div class="section-head">
          <h2 class="section-title" id="breath-title">Coherence Breathing</h2>
          <span class="duration-pill" aria-label="Suggested duration 5 minutes">5 min</span>
        </div>
        <div class="breath-panel">
          <div class="breath-stage">
            <div class="breath-progress" id="breathProgress" aria-hidden="true">
              <div class="breath-progress-inner">
                <button class="breath-toggle" id="breathToggle" type="button" aria-pressed="false">
                  <span class="breath-label">
                    <strong id="breathCount">5</strong>
                    <span id="breathAction">Start</span>
                  </span>
                </button>
              </div>
            </div>
          </div>
          <p class="breath-prompt">Tap the circle to begin 5 min cardiac coherence exercise.</p>
        </div>
        </section>
      </div>
    </main>
  </div>

  <div class="zoom-overlay" id="zoomOverlay" aria-hidden="true">
    <img id="zoomImage" alt="">
  </div>

  <script>
    const quotes = [
      { text: "The quietest moment can become the most powerful one.", author: "Lao Tzu" },
      { text: "Almost everything will work again if you unplug it for a few minutes, including you.", author: "Anne Lamott" },
      { text: "Within you there is a stillness and a sanctuary to which you can retreat at any time.", author: "Hermann Hesse" },
      { text: "Feelings come and go like clouds in a windy sky. Conscious breathing is my anchor.", author: "Thich Nhat Hanh" },
      { text: "The body benefits from movement, and the mind benefits from stillness.", author: "Sakyong Mipham" },
      { text: "You are the sky. Everything else is just the weather.", author: "Pema Chodron" },
      { text: "Have a mind that is open to everything and attached to nothing.", author: "Wayne Dyer" },
      { text: "Don't die with your music still in you.", author: "Wayne Dyer" },
      { text: "You can't give away what you don't have.", author: "Wayne Dyer" },
      { text: "Embrace silence.", author: "Wayne Dyer" },
      { text: "Give up your personal history.", author: "Wayne Dyer" },
      { text: "You can't solve a problem with the same mind that created it.", author: "Wayne Dyer" },
      { text: "There are no justified resentments.", author: "Wayne Dyer" },
      { text: "Treat yourself as if you already are what you'd like to be.", author: "Wayne Dyer" },
      { text: "Treasure your divinity.", author: "Wayne Dyer" },
      { text: "Wisdom is avoiding all thoughts that weaken you.", author: "Wayne Dyer" },
      { text: "You have power over your mind - not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
      { text: "We suffer more often in imagination than in reality.", author: "Seneca" },
      { text: "The happiness of your life depends upon the quality of your thoughts.", author: "Marcus Aurelius" },
      { text: "Wealth consists not in having great possessions, but in having few wants.", author: "Epictetus" },
      { text: "Man is not worried by real problems so much as by his imagined anxieties about real problems.", author: "Epictetus" },
      { text: "The best revenge is to be unlike him who performed the injury.", author: "Marcus Aurelius" },
      { text: "Luck is what happens when preparation meets opportunity.", author: "Seneca" },
      { text: "Associate with people who are likely to improve you.", author: "Seneca" },

    const byId = (id) => document.getElementById(id);
    const today = new Date();
    const daySeed = Math.floor(today.setHours(0, 0, 0, 0) / 86400000);

    function pickDaily(list, count, offset = 0) {
      return Array.from({ length: count }, (_, index) => list[(daySeed + offset + index * 3) % list.length]);
    }

    function pickRandom(list, count, excludeItems = []) {
      const excluded = new Set(excludeItems);
      const pool = list.filter((item) => !excluded.has(item));
      const source = pool.length >= count ? pool : list;
      const shuffled = [...source];
      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
      }
      return shuffled.slice(0, count);
    }

    const currentPicks = {
      quotes: pickDaily(quotes, 1),
      mantras: pickDaily(mantras, 1, 7),
      mudras: pickDaily(mudras, 3, 1),
      poses: pickDaily(poses, 3, 2),
      dance: pickDaily(danceTracks, 1, 5)
    };

    function renderQuotes(quoteItems = currentPicks.quotes, mantraItems = currentPicks.mantras) {
      currentPicks.quotes = quoteItems;
      currentPicks.mantras = mantraItems;
      const quote = quoteItems[0];
      const mantra = mantraItems[0];
      byId("quotes").innerHTML = `
        <article class="quote-card">
          <blockquote>&ldquo;${quote.text}&rdquo;</blockquote>
          <cite>${quote.author}</cite>
        </article>
        <article class="quote-card">
          <p class="mantra"><a href="${youtubeSearchUrl(mantra.text)}" target="_blank" rel="noopener noreferrer">${mantra.text}</a></p>
          <div class="mantra-note">${mantra.note}</div>
        </article>
      `;
    }

    function youtubeSearchUrl(query) {
      return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
    }

    function renderPractice(target, items, className) {
      byId(target).innerHTML = items.map((item) => `
        <article class="practice-card ${className}">
          <button class="thumb zoom-trigger" type="button" data-full="${item.image}" data-alt="${item.title}" aria-label="Zoom ${item.title}">
            <img src="${item.image}" alt="${item.title}" loading="lazy">
          </button>
          <div class="practice-text">
            <h3 class="practice-title">${className === "pose-card" ? `<a href="${youtubeSearchUrl(item.title)}" target="_blank" rel="noopener noreferrer">${item.title}</a>` : item.title}</h3>
            <div class="sanskrit">${item.sanskrit}</div>
            <p class="practice-copy">${item.copy}</p>
          </div>
        </article>
      `).join("");
    }

    function renderDanceTrack() {
      const track = currentPicks.dance[0];
      const frame = byId("danceFrame");
      frame.src = `https://www.youtube-nocookie.com/embed/${track.id}?rel=0`;
      frame.title = track.title;
    }

    function reroll(section) {
      if (section === "quotes") {
        renderQuotes(
          pickRandom(quotes, 1, currentPicks.quotes),
          pickRandom(mantras, 1, currentPicks.mantras)
        );
      }
      if (section === "mudras") {
        currentPicks.mudras = pickRandom(mudras, 3, currentPicks.mudras);
        renderPractice("mudras", currentPicks.mudras, "mudra");
      }
      if (section === "poses") {
        currentPicks.poses = pickRandom(poses, 3, currentPicks.poses);
        renderPractice("poses", currentPicks.poses, "pose-card");
      }
      if (section === "dance") {
        currentPicks.dance = pickRandom(danceTracks, 1, currentPicks.dance);
        renderDanceTrack();
      }
    }

    function openZoom(src, alt) {
      const overlay = byId("zoomOverlay");
      const image = byId("zoomImage");
      image.src = src;
      image.alt = alt;
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeZoom() {
      const overlay = byId("zoomOverlay");
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function renderDate() {
      const now = new Date();
      byId("today").innerHTML = `
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
        ${new Intl.DateTimeFormat(undefined, { weekday: "long", month: "short", day: "numeric" }).format(now)}
      `;
    }

    const breath = {
      active: false,
      phase: "inhale",
      remaining: 5,
      interval: null,
      audio: null,
      masterGain: null,
      sessionStartedAt: 0,
      sessionDuration: 5 * 60 * 1000,
      progressFrame: null
    };

    function audioContext() {
      if (!breath.audio) {
        breath.audio = new (window.AudioContext || window.webkitAudioContext)();
        breath.masterGain = breath.audio.createGain();
        breath.masterGain.connect(breath.audio.destination);
        breath.masterGain.gain.setValueAtTime(0.5, breath.audio.currentTime);
      }
      return breath.audio;
    }

    function playHridayamBell(pitch = 600, duration = 3.1) {
      const ctx = audioContext();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(pitch, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.4, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(breath.masterGain);
      osc.start(now);
      osc.stop(now + duration + 0.1);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = "sine";
      osc2.frequency.setValueAtTime(pitch * 2.5, now);
      gain2.gain.setValueAtTime(0, now);
      gain2.gain.linearRampToValueAtTime(0.1, now + 0.02);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + (duration / 2));
      osc2.connect(gain2);
      gain2.connect(breath.masterGain);
      osc2.start(now);
      osc2.stop(now + (duration / 2) + 0.1);
    }

    function updateBreathUi() {
      const panel = byId("breathing");
      panel.classList.toggle("inhale", breath.phase === "inhale");
      panel.classList.toggle("exhale", breath.phase === "exhale");
      panel.classList.toggle("is-active", breath.active);
      byId("breathCount").textContent = breath.active ? breath.remaining : "5";
      byId("breathAction").textContent = breath.active ? breath.phase : "Start";
      byId("breathToggle").setAttribute("aria-pressed", String(breath.active));
    }

    function updateSessionProgress() {
      const elapsed = breath.active ? Date.now() - breath.sessionStartedAt : 0;
      const progress = Math.min(elapsed / breath.sessionDuration, 1) * 100;
      byId("breathProgress").style.setProperty("--session-progress", `${progress}%`);
      if (breath.active && progress < 100) {
        breath.progressFrame = requestAnimationFrame(updateSessionProgress);
        return;
      }
      if (breath.active && progress >= 100) {
        stopBreathing();
      }
    }

    function nextBreathPhase() {
      breath.phase = breath.phase === "inhale" ? "exhale" : "inhale";
      breath.remaining = 5;
      playHridayamBell(breath.phase === "inhale" ? 528 : 396);
      updateBreathUi();
    }

    function startBreathing() {
      breath.active = true;
      breath.phase = "inhale";
      breath.remaining = 5;
      breath.sessionStartedAt = Date.now();
      playHridayamBell(528);
      updateBreathUi();
      updateSessionProgress();
      breath.interval = window.setInterval(() => {
        breath.remaining -= 1;
        if (breath.remaining <= 0) {
          nextBreathPhase();
          return;
        }
        updateBreathUi();
      }, 1000);
    }

    function stopBreathing() {
      breath.active = false;
      window.clearInterval(breath.interval);
      cancelAnimationFrame(breath.progressFrame);
      breath.interval = null;
      breath.progressFrame = null;
      breath.phase = "exhale";
      breath.remaining = 5;
      updateBreathUi();
      updateSessionProgress();
    }

    byId("breathToggle").addEventListener("click", async () => {
      if (breath.audio?.state === "suspended") {
        await breath.audio.resume();
      }
      breath.active ? stopBreathing() : startBreathing();
    });

    document.addEventListener("click", (event) => {
      const rerollTrigger = event.target.closest("[data-reroll]");
      if (rerollTrigger) {
        reroll(rerollTrigger.dataset.reroll);
        return;
      }
      const trigger = event.target.closest(".zoom-trigger");
      if (trigger) {
        openZoom(trigger.dataset.full, trigger.dataset.alt);
        return;
      }
      if (event.target.closest("#zoomOverlay")) {
        closeZoom();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && byId("zoomOverlay").classList.contains("open")) {
        closeZoom();
      }
    });

    let wakeLock = null;

    async function requestWakeLock() {
      if (!("wakeLock" in navigator) || document.visibilityState !== "visible") return;
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch {
        wakeLock = null;
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && !wakeLock) {
        requestWakeLock();
      }
    });

    renderDate();
    renderQuotes();
    renderPractice("mudras", currentPicks.mudras, "mudra");
    renderPractice("poses", currentPicks.poses, "pose-card");
    renderDanceTrack();
    updateBreathUi();
    requestWakeLock();
