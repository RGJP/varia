    function chooseTrack(tracks) {
      const max = 0x100000000;
      const limit = max - (max % tracks.length);
      const random = new Uint32Array(1);
      let value;

      do {
        crypto.getRandomValues(random);
        value = random[0];
      } while (value >= limit);

      const index = value % tracks.length;
      return tracks[index];
    }

    function chooseNextTrack() {
      let track = chooseTrack(tracks);

      if (tracks.length > 1) {
        while (track === currentTrack) {
          track = chooseTrack(tracks);
        }
      }

      return track;
    }

    function formatTime(milliseconds) {
      if (!Number.isFinite(milliseconds) || milliseconds <= 0) {
        return "0:00";
      }

      const totalSeconds = Math.floor(milliseconds / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function titleFromTrackUrl(track) {
      const slug = track.split("/").pop() || "Méditation";
      return slug
        .replace(/^\d{6,8}-?/, "")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/^./, (letter) => letter.toUpperCase()) || "Méditation";
    }

    function updateProgress(position) {
      currentTimeText.textContent = formatTime(position);
      durationText.textContent = formatTime(duration);

      if (!seeking && duration > 0) {
        progressInput.value = Math.round((position / duration) * Number(progressInput.max));
      }
    }

    function loadRandomTrack() {
      const track = chooseNextTrack();
      const attempt = ++loadAttempt;
      currentTrack = track;
      currentTitle = titleFromTrackUrl(track);
      duration = 0;
      playing = false;
      progressInput.value = 0;
      updateProgress(0);
      statusText.textContent = "Chargement...";

      clearTimeout(readyTimeout);
      readyTimeout = setTimeout(() => {
        if (attempt === loadAttempt) {
          statusText.textContent = "Lien indisponible, nouvelle tentative...";
          loadRandomTrack();
        }
      }, 8000);

      const params = new URLSearchParams({
        url: track,
        auto_play: "true",
        buying: "false",
        liking: "false",
        download: "false",
        sharing: "false",
        show_artwork: "false",
        show_comments: "false",
        show_playcount: "false",
        show_user: "false",
        visual: "false"
      });

      player.src = `https://w.soundcloud.com/player/?${params.toString()}`;
      bindWidget(attempt);
    }

    function bindWidget(attempt) {
      widget = SC.Widget(player);

      widget.bind(SC.Widget.Events.READY, () => {
        if (attempt !== loadAttempt) {
          return;
        }

        clearTimeout(readyTimeout);

        widget.getCurrentSound((sound) => {
          if (attempt !== loadAttempt) {
            return;
          }

          if (sound && sound.title) {
            currentTitle = sound.title;
            statusText.textContent = currentTitle;
          }
        });

        widget.getDuration((trackDuration) => {
          if (attempt !== loadAttempt) {
            return;
          }

          duration = trackDuration || 0;
          progressWrap.classList.add("is-visible");
          updateProgress(0);
          widget.play();
        });
      });

      widget.bind(SC.Widget.Events.PLAY, () => {
        if (attempt !== loadAttempt) {
          return;
        }

        playing = true;
        playButton.textContent = "Pause";
        statusText.textContent = currentTitle || "Méditation";
      });

      widget.bind(SC.Widget.Events.PAUSE, () => {
        if (attempt !== loadAttempt) {
          return;
        }

        playing = false;
        playButton.textContent = "Reprendre";
        statusText.textContent = currentTitle || "Méditation";
      });

      widget.bind(SC.Widget.Events.PLAY_PROGRESS, (event) => {
        if (attempt !== loadAttempt) {
          return;
        }

        updateProgress(event.currentPosition || 0);
      });

      widget.bind(SC.Widget.Events.FINISH, () => {
        if (attempt !== loadAttempt) {
          return;
        }

        playing = false;
        started = false;
        widget = null;
        playButton.textContent = "Écouter, pour Voir";
        statusText.textContent = "Méditation terminée.";
        updateProgress(duration);
      });
    }

    progressInput.addEventListener("input", () => {
      seeking = true;

      if (duration > 0) {
        const position = (Number(progressInput.value) / Number(progressInput.max)) * duration;
        updateProgress(position);
      }
    });

    progressInput.addEventListener("change", () => {
      if (widget && duration > 0) {
        const position = (Number(progressInput.value) / Number(progressInput.max)) * duration;
        widget.seekTo(position);
      }

      seeking = false;
    });

    playButton.addEventListener("click", async () => {
      playButton.disabled = true;
      statusText.textContent = "Chargement...";

      try {
        if (!started) {
          started = true;
          loadRandomTrack();
          return;
        }

        if (widget && playing) {
          widget.pause();
        } else if (widget) {
          widget.play();
        }
      } catch (error) {
        statusText.textContent = error.message;
      } finally {
        playButton.disabled = false;
      }
    });
  </script>
