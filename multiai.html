<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Compare multiple AI models side by side with streaming responses.">
  <meta name="theme-color" content="#0f172a">
  <title>Multi AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://js.puter.com/v2/"></script>

  <style>
    :root {
      --bg-0: #071017;
      --bg-1: #0b1621;
      --bg-2: #142738;
      --panel: rgba(8, 15, 23, 0.82);
      --panel-hover: rgba(13, 23, 34, 0.92);
      --panel-border: rgba(154, 175, 198, 0.2);
      --panel-strong-border: rgba(86, 149, 189, 0.58);
      --text-main: #e9f2ff;
      --text-secondary: #a6bdd9;
      --text-muted: #71839a;
      --accent: #2dd4bf;
      --accent-2: #f59e0b;
      --ok: #10b981;
      --warn: #f59e0b;
      --error: #ef4444;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 9px;
      --shadow-1: 0 20px 60px rgba(0, 0, 0, 0.35);
      --shadow-2: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(80rem 50rem at -10% -10%, rgba(45, 212, 191, 0.18), transparent 55%),
        radial-gradient(56rem 40rem at 110% -15%, rgba(245, 158, 11, 0.14), transparent 50%),
        linear-gradient(170deg, var(--bg-2), var(--bg-0));
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app {
      height: 100%;
      width: min(1700px, 100%);
      margin: 0 auto;
      padding: 1.2rem;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 1rem;
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
    }

    .top {
      padding: 0.95rem 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      line-height: 1.15;
    }

    .brand-mark {
      width: 2.1rem;
      height: 2.1rem;
      border-radius: 0.7rem;
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      background: linear-gradient(160deg, rgba(45, 212, 191, 0.24), rgba(245, 158, 11, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 0 18px rgba(45, 212, 191, 0.22);
    }

    .brand h1 {
      font-size: clamp(1.05rem, 2.2vw, 1.5rem);
      letter-spacing: 0.01em;
    }

    .brand p {
      color: var(--text-secondary);
      font-size: 0.86rem;
      margin-top: 0.12rem;
    }

    .auth-btn {
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      padding: 0.4rem 0.8rem;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      transition: 180ms ease;
      max-width: 45ch;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .auth-btn:hover,
    .auth-btn:focus-visible {
      border-color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.08);
      outline: none;
    }

    .composer {
      padding: 0.9rem;
      display: grid;
      gap: 0.8rem;
    }

    .textarea-wrap {
      border-radius: var(--radius-md);
      border: 1px solid var(--panel-border);
      background: rgba(0, 0, 0, 0.25);
      transition: 200ms ease;
      display: grid;
    }

    .textarea-wrap:focus-within {
      border-color: var(--panel-strong-border);
      box-shadow: 0 0 0 1px rgba(45, 212, 191, 0.45), inset 0 0 0 1px rgba(45, 212, 191, 0.2);
    }

    #promptInput {
      border: none;
      outline: none;
      width: 100%;
      min-height: 74px;
      max-height: 220px;
      resize: none;
      overflow: auto;
      background: transparent;
      color: var(--text-main);
      font: 500 0.97rem/1.55 "Space Grotesk", system-ui, sans-serif;
      padding: 0.78rem 0.92rem;
    }

    #promptInput::placeholder {
      color: var(--text-muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
    }

    .left-controls,
    .right-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.52rem;
    }

    .btn {
      border-radius: 10px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      height: 2.1rem;
      padding: 0 0.75rem;
      font: 600 0.83rem/1 "Space Grotesk", system-ui, sans-serif;
      cursor: pointer;
      transition: 160ms ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.4);
      outline: none;
    }

    .btn[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      border-color: rgba(45, 212, 191, 0.48);
      background: linear-gradient(160deg, rgba(45, 212, 191, 0.36), rgba(24, 36, 58, 0.55));
      box-shadow: inset 0 0 0 1px rgba(45, 212, 191, 0.2);
    }

    .btn-danger {
      border-color: rgba(239, 68, 68, 0.44);
      background: rgba(127, 29, 29, 0.28);
    }

    .hint {
      color: var(--text-muted);
      font-size: 0.77rem;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .switch input {
      accent-color: var(--accent);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
    }

    .chip {
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-secondary);
      font: 500 0.76rem/1 "Space Grotesk", system-ui, sans-serif;
      padding: 0.38rem 0.66rem;
      cursor: pointer;
      transition: 140ms ease;
    }

    .chip:hover,
    .chip:focus-visible {
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.11);
      outline: none;
    }

    .cards {
      overflow: auto;
      padding-right: 0.2rem;
    }

    .grid {
      min-height: 100%;
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 1rem;
    }

    .card {
      min-height: 320px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: var(--shadow-2);
      overflow: hidden;
      position: relative;
      transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .card:hover {
      background: var(--panel-hover);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .card.running {
      border-color: rgba(45, 212, 191, 0.55);
      box-shadow: 0 0 0 1px rgba(45, 212, 191, 0.35), var(--shadow-2);
    }

    .card.error {
      border-color: rgba(239, 68, 68, 0.64);
    }

    .card.disabled {
      opacity: 0.56;
      filter: grayscale(0.25);
    }

    .card-head {
      padding: 0.72rem 0.82rem;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .model-title {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
    }

    .model-icon {
      width: 1.45rem;
      height: 1.45rem;
      border-radius: 0.45rem;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.17);
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .model-name {
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .vendor {
      font-size: 0.69rem;
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      padding: 0.15rem 0.38rem;
      flex-shrink: 0;
    }

    .head-right {
      display: flex;
      align-items: center;
      gap: 0.42rem;
      flex-shrink: 0;
    }

    .enable-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status {
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      padding: 0.16rem 0.5rem;
      font: 600 0.66rem/1 "IBM Plex Mono", monospace;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      min-width: 8ch;
      text-align: center;
    }

    .status.running {
      color: var(--warn);
      border-color: rgba(245, 158, 11, 0.5);
    }

    .status.done {
      color: var(--ok);
      border-color: rgba(16, 185, 129, 0.5);
    }

    .status.error {
      color: var(--error);
      border-color: rgba(239, 68, 68, 0.5);
    }

    .status.cancelled {
      color: var(--text-muted);
    }

    .card-body {
      padding: 0.92rem;
      overflow: auto;
      color: var(--text-main);
      line-height: 1.58;
      font-size: 0.95rem;
    }

    .placeholder {
      color: var(--text-muted);
      font-size: 0.86rem;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      padding: 0.7rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .card-body p,
    .card-body ul,
    .card-body ol,
    .card-body pre,
    .card-body blockquote,
    .card-body table,
    .card-body h1,
    .card-body h2,
    .card-body h3,
    .card-body h4 {
      margin-bottom: 0.82rem;
    }

    .card-body h1,
    .card-body h2,
    .card-body h3,
    .card-body h4 {
      line-height: 1.28;
      margin-top: 1.1rem;
      color: #ffffff;
    }

    .card-body h1 { font-size: 1.2rem; }
    .card-body h2 { font-size: 1.1rem; }
    .card-body h3 { font-size: 1.02rem; }
    .card-body h4 { font-size: 0.95rem; }

    .card-body code {
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 0.85em;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.09rem 0.35rem;
      border-radius: 6px;
      color: #dff6ff;
    }

    .card-body pre {
      border: 1px solid rgba(255, 255, 255, 0.17);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.36);
      overflow: auto;
      padding: 0.64rem;
    }

    .card-body pre code {
      background: transparent;
      padding: 0;
    }

    .card-body a {
      color: #7ae2ff;
      text-underline-offset: 3px;
    }

    .card-body blockquote {
      border-left: 3px solid rgba(45, 212, 191, 0.7);
      padding-left: 0.56rem;
      color: #c9def6;
      opacity: 0.9;
    }

    .card-foot {
      border-top: 1px solid var(--panel-border);
      padding: 0.58rem 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.65rem;
      background: rgba(0, 0, 0, 0.2);
    }

    .metrics {
      color: var(--text-muted);
      font: 500 0.72rem/1 "IBM Plex Mono", monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .mini-btn {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-secondary);
      border-radius: 8px;
      height: 1.8rem;
      font: 600 0.72rem/1 "Space Grotesk", system-ui, sans-serif;
      padding: 0 0.5rem;
      cursor: pointer;
      transition: 140ms ease;
    }

    .mini-btn:hover,
    .mini-btn:focus-visible {
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.11);
      outline: none;
    }

    .mini-btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.22);
      border-radius: 999px;
    }

    @media (min-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100%;
        padding: 0.7rem;
      }

      .top {
        padding: 0.78rem;
      }

      .cards {
        overflow: visible;
      }

      .grid {
        min-height: auto;
      }

      .card {
        min-height: 310px;
      }

      .hint {
        display: none;
      }

      .auth-btn {
        max-width: 28ch;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Multi model comparison console">
    <section class="top glass" aria-label="Header and account">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">AI</div>
        <div>
          <h1>Multi AI</h1>
     
        </div>
      </div>
      <a id="authBtn" class="auth-btn" href="#" role="button" aria-live="polite">Checking account...</a>
    </section>

    <section class="composer glass" aria-label="Prompt composer">
      <div class="textarea-wrap">
        <label for="promptInput" class="sr-only">Prompt</label>
        <textarea id="promptInput" placeholder="Ask anything..."></textarea>
      </div>

      <div class="controls">
        <div class="left-controls">
          <button id="sendBtn" class="btn btn-primary" type="button">Run</button>
          <button id="stopBtn" class="btn btn-danger" type="button" disabled>Stop</button>
          <button id="clearBtn" class="btn" type="button">Clear</button>
          <button id="copyAllBtn" class="btn" type="button" disabled>Copy all</button>
        </div>

        <div class="right-controls">
          <span class="hint"> </span>
        </div>
      </div>

    </section>

    <section class="cards" aria-label="Model responses">
      <div id="grid" class="grid"></div>
    </section>

    <p id="a11yStatus" class="sr-only" aria-live="polite"></p>
  </main>

  <script>
    const MODELS = [
      { id: "openai/gpt-5.3-chat", domId: "gpt53", name: "GPT 5.3", icon: "OA", vendor: "OpenAI" },
      { id: "anthropic/claude-sonnet-4-6", domId: "claude", name: "Claude Sonnet 4.6", icon: "AN", vendor: "Anthropic" },
      { id: "google/gemini-3.1-flash-lite-preview", domId: "gemini", name: "Gemini 3.1 Flash Lite", icon: "GO", vendor: "Google" },
      { id: "mistralai/mistral-large-2512", domId: "mistral", name: "Mistral Large 3", icon: "MI", vendor: "Mistral AI" }
    ];

    const STORAGE_KEY = "multiai-settings-v2";

    const state = {
      runToken: 0,
      isRunning: false,
      rawByModel: {},
      startedAtByModel: {},
      modelEnabled: Object.fromEntries(MODELS.map(m => [m.domId, true]))
    };

    const els = {
      authBtn: document.getElementById("authBtn"),
      promptInput: document.getElementById("promptInput"),
      sendBtn: document.getElementById("sendBtn"),
      stopBtn: document.getElementById("stopBtn"),
      clearBtn: document.getElementById("clearBtn"),
      copyAllBtn: document.getElementById("copyAllBtn"),
      grid: document.getElementById("grid"),
      a11yStatus: document.getElementById("a11yStatus")
    };

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        if (saved.modelEnabled && typeof saved.modelEnabled === "object") {
          for (const model of MODELS) {
            if (typeof saved.modelEnabled[model.domId] === "boolean") {
              state.modelEnabled[model.domId] = saved.modelEnabled[model.domId];
            }
          }
        }
      } catch (err) {
        console.warn("Failed to load saved settings", err);
      }
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        modelEnabled: state.modelEnabled
      }));
    }

    function announce(message) {
      els.a11yStatus.textContent = message;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function sanitizeHtml(dirtyHtml) {
      const template = document.createElement("template");
      template.innerHTML = dirtyHtml;

      template.content.querySelectorAll("script,style,iframe,object,embed,meta,link,svg,math,form,input,button,textarea,select").forEach(node => node.remove());

      const all = template.content.querySelectorAll("*");
      for (const node of all) {
        const attrs = [...node.attributes];
        for (const attr of attrs) {
          const name = attr.name.toLowerCase();
          const val = attr.value;

          if (name.startsWith("on")) {
            node.removeAttribute(attr.name);
            continue;
          }

          if ((name === "href" || name === "src") && val) {
            const trimmed = val.trim().toLowerCase();
            const safe = trimmed.startsWith("http://") || trimmed.startsWith("https://") || trimmed.startsWith("mailto:") || trimmed.startsWith("tel:") || trimmed.startsWith("#");
            if (!safe) {
              node.removeAttribute(attr.name);
            }
          }

          if (name === "target" && val === "_blank") {
            node.setAttribute("rel", "noopener noreferrer");
          }
        }
      }

      return template.innerHTML;
    }

    function getChunkText(part) {
      if (typeof part === "string") {
        return part;
      }
      if (part?.text) {
        return part.text;
      }
      if (Array.isArray(part?.content)) {
        return part.content.map(item => item?.text || "").join("");
      }
      return "";
    }

    function markdownToSafeHtml(markdown) {
      let rendered;
      try {
        rendered = marked.parse(markdown, { gfm: true, breaks: true });
      } catch (err) {
        return `<pre>${escapeHtml(markdown)}</pre>`;
      }
      return sanitizeHtml(rendered);
    }

    function cardEl(domId, suffix) {
      return document.getElementById(`${suffix}-${domId}`);
    }

    function setCardStatus(domId, stateName, label) {
      const card = cardEl(domId, "card");
      const status = cardEl(domId, "status");
      if (!card || !status) return;

      card.classList.remove("running", "error");
      status.classList.remove("running", "done", "error", "cancelled");

      if (stateName === "running") {
        card.classList.add("running");
        status.classList.add("running");
      } else if (stateName === "done") {
        status.classList.add("done");
      } else if (stateName === "error") {
        card.classList.add("error");
        status.classList.add("error");
      } else if (stateName === "cancelled") {
        status.classList.add("cancelled");
      }

      status.textContent = label;
    }

    function setCardDisabled(domId, disabled) {
      const card = cardEl(domId, "card");
      if (!card) return;
      card.classList.toggle("disabled", disabled);
    }

    function setCardOutput(domId, markdownText) {
      const body = cardEl(domId, "body");
      if (!body) return;

      if (!markdownText.trim()) {
        body.innerHTML = '<div class="placeholder">Waiting for prompt.</div>';
        return;
      }

      body.innerHTML = markdownToSafeHtml(markdownText);
      body.scrollTop = body.scrollHeight;
    }

    function setCardMetrics(domId, metricsText) {
      const metrics = cardEl(domId, "metrics");
      if (metrics) {
        metrics.textContent = metricsText;
      }
    }

    function setModelCopyEnabled(domId, enabled) {
      const btn = cardEl(domId, "copy");
      if (btn) btn.disabled = !enabled;
    }

    function renderCards() {
      const html = MODELS.map(model => `
        <article class="card" id="card-${model.domId}">
          <header class="card-head">
            <div class="model-title">
              <div class="model-icon" aria-hidden="true">${model.icon}</div>
              <div class="model-name" title="${model.name}">${model.name}</div>
              <span class="vendor">${model.vendor}</span>
            </div>

            <div class="head-right">
              <label class="enable-wrap" for="enable-${model.domId}">
                On
                <input id="enable-${model.domId}" data-model-id="${model.domId}" type="checkbox" ${state.modelEnabled[model.domId] ? "checked" : ""} aria-label="Enable ${model.name}">
              </label>
              <div id="status-${model.domId}" class="status">idle</div>
            </div>
          </header>

          <section id="body-${model.domId}" class="card-body" aria-live="off">
            <div class="placeholder">Waiting for prompt.</div>
          </section>

          <footer class="card-foot">
            <div id="metrics-${model.domId}" class="metrics">chars: 0 | time: -</div>
            <div class="card-actions">
              <button id="copy-${model.domId}" class="mini-btn" type="button" data-copy-model="${model.domId}" disabled>Copy</button>
            </div>
          </footer>
        </article>
      `).join("");

      els.grid.innerHTML = html;

      for (const model of MODELS) {
        setCardDisabled(model.domId, !state.modelEnabled[model.domId]);
      }

      els.grid.querySelectorAll("input[data-model-id]").forEach(input => {
        input.addEventListener("change", () => {
          const domId = input.getAttribute("data-model-id");
          state.modelEnabled[domId] = input.checked;
          setCardDisabled(domId, !input.checked);
          saveSettings();
        });
      });

      els.grid.querySelectorAll("button[data-copy-model]").forEach(btn => {
        btn.addEventListener("click", () => copyModel(btn.getAttribute("data-copy-model")));
      });
    }

    function autosizeTextarea() {
      els.promptInput.style.height = "0px";
      const next = Math.min(220, Math.max(74, els.promptInput.scrollHeight));
      els.promptInput.style.height = `${next}px`;
    }

    function setRunningUI(running) {
      state.isRunning = running;
      els.sendBtn.disabled = running;
      els.stopBtn.disabled = !running;
      els.clearBtn.disabled = running;
      els.promptInput.disabled = running;

      if (running) {
        els.sendBtn.textContent = "Running...";
      } else {
        els.sendBtn.textContent = "Run";
      }
    }

    function updateGlobalActions() {
      const hasAny = MODELS.some(m => (state.rawByModel[m.domId] || "").trim().length > 0);
      els.copyAllBtn.disabled = !hasAny;
    }

    async function updateAuthStatus() {
      try {
        const user = await puter.auth.getUser();
        if (user) {
          els.authBtn.textContent = `Connected: ${user.username || "account"}`;
          els.authBtn.href = "https://puter.com";
          els.authBtn.target = "_blank";
          els.authBtn.onclick = null;
          els.authBtn.style.borderColor = "rgba(16, 185, 129, 0.7)";
          els.authBtn.style.color = "#6ee7b7";
          return;
        }
      } catch (err) {
        console.warn("Auth status check failed", err);
      }

      els.authBtn.textContent = "Connect account";
      els.authBtn.href = "#";
      els.authBtn.target = "_self";
      els.authBtn.style.borderColor = "";
      els.authBtn.style.color = "";
      els.authBtn.onclick = async (event) => {
        event.preventDefault();
        await connectAccount();
      };
    }

    async function connectAccount() {
      els.authBtn.textContent = "Connecting...";
      try {
        await puter.auth.signIn({ attempt_temp_user_creation: true });
      } catch (err) {
        console.error("Sign-in failed or dismissed", err);
      }
      await updateAuthStatus();
      try {
        const user = await puter.auth.getUser();
        return Boolean(user);
      } catch {
        return false;
      }
    }

    async function ensureSignedIn(interactive = false) {
      try {
        const user = await puter.auth.getUser();
        if (user) return true;
      } catch (err) {
        console.warn("Auth check failed", err);
      }
      if (!interactive) return false;
      return connectAccount();
    }

    function resetCardsForRun() {
      for (const model of MODELS) {
        const domId = model.domId;
        state.rawByModel[domId] = "";
        state.startedAtByModel[domId] = performance.now();
        setCardOutput(domId, "");
        setCardMetrics(domId, "chars: 0 | time: -");
        setModelCopyEnabled(domId, false);

        if (state.modelEnabled[domId]) {
          setCardStatus(domId, "running", "running");
        } else {
          setCardStatus(domId, "cancelled", "off");
        }
      }

      updateGlobalActions();
    }

    function stopRun() {
      if (!state.isRunning) return;
      state.runToken += 1;
      setRunningUI(false);
      announce("Run stopped");
    }

    async function runForModel(model, prompt, tokenAtStart) {
      const domId = model.domId;
      if (!state.modelEnabled[domId]) {
        return;
      }

      try {
        const stream = await puter.ai.chat(prompt, { model: model.id, stream: true });

        for await (const part of stream) {
          if (tokenAtStart !== state.runToken) {
            throw new Error("__cancelled__");
          }

          const chunk = getChunkText(part);
          if (!chunk) continue;

          state.rawByModel[domId] += chunk;
          setCardOutput(domId, state.rawByModel[domId]);

          const secs = (performance.now() - state.startedAtByModel[domId]) / 1000;
          const chars = state.rawByModel[domId].length;
          setCardMetrics(domId, `chars: ${chars} | time: ${secs.toFixed(1)}s`);
        }

        if (tokenAtStart !== state.runToken) {
          throw new Error("__cancelled__");
        }

        setCardStatus(domId, "done", "done");
        setModelCopyEnabled(domId, state.rawByModel[domId].trim().length > 0);
      } catch (err) {
        if (tokenAtStart !== state.runToken || err.message === "__cancelled__") {
          setCardStatus(domId, "cancelled", "stopped");
          return;
        }

        console.error(`Model failed: ${model.id}`, err);
        const message = err?.message || "Unknown error";
        state.rawByModel[domId] += `\n\n[System Error]\n${message}`;
        setCardOutput(domId, state.rawByModel[domId]);
        setCardStatus(domId, "error", "error");
        setCardMetrics(domId, `chars: ${state.rawByModel[domId].length} | failed`);
        setModelCopyEnabled(domId, state.rawByModel[domId].trim().length > 0);
      }
    }

    async function broadcastPrompt() {
      const prompt = els.promptInput.value.trim();
      if (!prompt) {
        els.promptInput.focus();
        announce("Prompt required");
        return;
      }

      const selectedCount = MODELS.filter(m => state.modelEnabled[m.domId]).length;
      if (selectedCount === 0) {
        announce("Enable at least one model");
        return;
      }

      const signed = await ensureSignedIn(true);
      if (!signed) {
        announce("Sign in failed");
        return;
      }

      const token = state.runToken + 1;
      state.runToken = token;
      setRunningUI(true);
      resetCardsForRun();
      announce(`Running ${selectedCount} model${selectedCount > 1 ? "s" : ""}`);

      const tasks = MODELS.map(async (model, index) => {
        await new Promise(resolve => setTimeout(resolve, index * 120));
        if (token !== state.runToken) return;
        await runForModel(model, prompt, token);
      });

      await Promise.allSettled(tasks);

      if (token === state.runToken) {
        setRunningUI(false);
        announce("Run completed");
      }

      updateGlobalActions();
      updateAuthStatus();
    }

    async function copyModel(domId) {
      const text = (state.rawByModel[domId] || "").trim();
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        const btn = cardEl(domId, "copy");
        if (!btn) return;
        const original = btn.textContent;
        btn.textContent = "Copied";
        setTimeout(() => {
          btn.textContent = original;
        }, 1000);
      } catch (err) {
        console.error("Copy failed", err);
      }
    }

    async function copyAll() {
      const entries = MODELS
        .map(m => {
          const text = (state.rawByModel[m.domId] || "").trim();
          if (!text) return "";
          return `## ${m.name}\n\n${text}`;
        })
        .filter(Boolean)
        .join("\n\n---\n\n");

      if (!entries) return;

      try {
        await navigator.clipboard.writeText(entries);
        const original = els.copyAllBtn.textContent;
        els.copyAllBtn.textContent = "Copied";
        setTimeout(() => {
          els.copyAllBtn.textContent = original;
        }, 1200);
      } catch (err) {
        console.error("Copy all failed", err);
      }
    }

    function clearAll() {
      if (state.isRunning) return;
      for (const model of MODELS) {
        state.rawByModel[model.domId] = "";
        setCardOutput(model.domId, "");
        setCardStatus(model.domId, "idle", state.modelEnabled[model.domId] ? "idle" : "off");
        setCardMetrics(model.domId, "chars: 0 | time: -");
        setModelCopyEnabled(model.domId, false);
      }
      updateGlobalActions();
      announce("Cleared");
    }

    function bindEvents() {
      els.sendBtn.addEventListener("click", broadcastPrompt);
      els.stopBtn.addEventListener("click", stopRun);
      els.clearBtn.addEventListener("click", clearAll);
      els.copyAllBtn.addEventListener("click", copyAll);

      els.promptInput.addEventListener("input", autosizeTextarea);
      els.promptInput.addEventListener("keydown", (event) => {
        const runShortcut = (event.ctrlKey || event.metaKey) && event.key === "Enter";
        if (runShortcut) {
          event.preventDefault();
          broadcastPrompt();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          stopRun();
        }
      });

      window.addEventListener("focus", updateAuthStatus);
      window.addEventListener("beforeunload", () => {
        state.runToken += 1;
      });
    }

    async function init() {
      loadSettings();
      renderCards();
      bindEvents();

      autosizeTextarea();
      setRunningUI(false);

      for (const model of MODELS) {
        setCardStatus(model.domId, "idle", state.modelEnabled[model.domId] ? "idle" : "off");
      }

      await updateAuthStatus();
    }

    init().catch(err => {
      console.error("Initialization failed", err);
      announce("Initialization failed");
    });
  </script>
</body>
</html>
