<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EmojiLand</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⭐%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="mobile-ui">
        <button id="btn-camera" class="ui-btn ui-btn-camera">🎦</button>
        <button id="btn-layout-reset" class="ui-btn ui-btn-layout-reset">🔄️ Reset controls</button>
        <div id="layout-edit-hint">Layout Edit Mode - Drag circled controls to reposition</div>
        <div id="layout-reset-confirm" aria-hidden="true">
            <div class="layout-reset-confirm-panel" role="dialog" aria-modal="true" aria-label="Reset controls confirmation">
                <div class="layout-reset-confirm-text">Reset controls to default positions?</div>
                <div class="layout-reset-confirm-actions">
                    <button id="btn-layout-reset-no" class="layout-reset-confirm-btn" type="button">No</button>
                    <button id="btn-layout-reset-yes" class="layout-reset-confirm-btn is-danger" type="button">Yes, reset</button>
                </div>
            </div>
        </div>
        <button id="btn-layout" class="ui-btn ui-btn-layout">⚙️</button>
        <button id="btn-pause" class="ui-btn ui-btn-pause">⏯️</button>
        <div id="joystick-zone" class="joystick-zone">
            <div id="joystick-knob" class="joystick-knob"></div>
        </div>
        <div class="action-buttons">
            <button id="btn-charge-toggle" class="ui-btn">⬆️</button>
            <button id="btn-attack" class="ui-btn ui-btn-large">🪨</button>
            <button id="btn-bomb" class="ui-btn ui-btn-large">💣</button>
            <button id="btn-jump" class="ui-btn ui-btn-large">🦘</button>
            <button id="btn-portal" class="ui-btn">🌀</button>
        </div>
    </div>
    <div id="orientation-warning">
        <div class="warning-content">
            <div class="warning-icon">🔄️</div>
            <div class="warning-text">Use horizontal mode on mobile!</div>
            <div class="warning-subtext">Rotate your device for the best experience</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script type="module" src="js/main.js"></script>
</body>

</html>
