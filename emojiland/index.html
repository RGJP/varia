<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EmojiLand</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⭐%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="mobile-ui">
        <button id="btn-camera" class="ui-btn ui-btn-camera">🎦</button>
        <button id="btn-pause" class="ui-btn ui-btn-pause">⏸️</button>
        <div id="joystick-zone" class="joystick-zone">
            <div id="joystick-knob" class="joystick-knob"></div>
        </div>
        <div class="action-buttons">
            <button id="btn-attack" class="ui-btn ui-btn-large">🪨</button>
            <button id="btn-bomb" class="ui-btn ui-btn-large">💣</button>
            <button id="btn-jump" class="ui-btn ui-btn-large">🦘</button>
        </div>
    </div>
    <div id="orientation-warning">
        <div class="warning-content">
            <div class="warning-icon">🔄️</div>
            <div class="warning-text">Use horizontal mode on mobile!</div>
            <div class="warning-subtext">Rotate your device for the best experience</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script type="module" src="js/main.js"></script>
</body>

</html>
