<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7faf5">
    <meta name="color-scheme" content="light">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta
      name="description"
      content="Messe Québec affiche les horaires de messes des églises du Québec sur une carte mobile."
    >
    <title>Messe Québec</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <noscript>
      <p class="noscript">Messe Québec a besoin de JavaScript pour charger la carte et les horaires.</p>
    </noscript>

    <main class="app-shell" aria-label="Messe Québec">
      <div id="map" aria-label="Carte des messes au Québec"></div>

      <header class="topbar" aria-label="Commandes">
        <div class="brand-block">
          <strong>⛪ Messe Québec</strong>
        </div>
        <div class="topbar-actions">
          <button id="locateButton" class="control-button" type="button">
            📍 LOCALISER
          </button>
        </div>
      </header>

      <nav class="resource-menu" aria-label="Liens utiles">
        <select id="resourceSelect" class="resource-select">
          <option value="">LIENS UTILES</option>
          <option value="https://www.aelf.org/">AELF 📖</option>
          <option value="https://www.regnumchristi.fr/meditation-du-jour/">Regnum Christi 🙏</option>
          <option value="https://m.youtube.com/playlist?list=PLgzgcyL6piaOWIAEI1B2zeSIw6YDDUuk1">Messe SL 🔊</option>
          <option value="https://www.prionseneglise.ca/">Prions 🕊️</option>
          <option value="https://cdn.shopify.com/s/files/1/0064/1564/6787/files/Prieres_du_chapelet_en_pdf.pdf?9572856574916796837">Chapelet 📿</option>
          <option value="https://semainierparoissial.com/paroisse-eglise.php">Semainiers 📰</option>
          <option value="https://radiogalilee.com/ecoute-a-la-carte/">Radio Galilée 🎙️</option>
          <option value="https://ecdq.org/events">ECDQ Éven. 🗓️</option>
          <option value="https://divineoffice.org/">Divine Office 📜</option>
          <option value="https://prayasyougo.org/">Pray As You Go 🔊</option>
        </select>
      </nav>

      <button id="todayMassesButton" class="today-masses-button" type="button">
        POSSIBILITÉS DU JOUR
      </button>

      <section class="status-strip" aria-live="polite">
        <span id="statusText">Chargement des messes...</span>
        <span id="visibleText">0 / 0</span>
      </section>

      <a class="feedback-link" href="mailto:rakha6727@gmail.com">📧 Commentaires</a>

      <div id="todayMassesOverlay" class="today-masses-overlay is-hidden" aria-hidden="true">
        <section class="today-masses-panel" role="dialog" aria-modal="true" aria-labelledby="todayMassesTitle">
          <div class="today-masses-header">
            <h2 id="todayMassesTitle">Possibilités du jour</h2>
            <button id="todayMassesClose" class="today-masses-close" type="button" aria-label="Fermer">
              Fermer
            </button>
          </div>
          <div id="todayMassesList" class="today-masses-list"></div>
        </section>
      </div>

      <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite">
        <div class="loading-panel">
          <span class="loading-spinner" aria-hidden="true"></span>
        </div>
      </div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js" defer></script>
  </body>
</html>
